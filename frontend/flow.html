<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>daita-studio – Flow</title>
    <link rel="stylesheet" href="style.css">
    <script src="config.js"></script>
    <script src="components/api.js"></script>
    <script src="components/nav-header.js"></script>
    <script src="components/job-detail.js"></script>
    <script src="components/column-selector.js"></script>
    <script src="components/etl-wizard.js"></script>
    <style>
        body { margin: 0; background: var(--bg-color, #f0f2f5); }
        .flow-page { display: flex; flex-direction: column; min-height: 100vh; }

        /* ── Main-Layout: Flow-Bereich + Side-Panel ───────────────── */
        .flow-body {
            display: flex; flex: 1; overflow: hidden;
            height: calc(100vh - 56px); /* Nav-Höhe abziehen */
        }
        .flow-area {
            flex: 1; overflow-y: auto; padding: 24px;
        }
        .flow-side {
            width: 420px; flex-shrink: 0;
            background: #fff;
            box-shadow: -2px 0 8px rgba(0,0,0,0.09);
            display: flex; flex-direction: column;
            transition: width 0.25s;
        }
        .flow-side.hidden { width: 0; overflow: hidden; }

        .side-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff; padding: 14px 16px;
            display: flex; align-items: center; justify-content: space-between;
            flex-shrink: 0;
        }
        .side-header-title { font-weight: 700; font-size: 0.95em; }
        .side-close {
            background: none; border: none; cursor: pointer;
            color: #fff; font-size: 1.2em; line-height: 1; opacity: 0.85;
        }
        .side-close:hover { opacity: 1; }
        .side-body { flex: 1; overflow-y: auto; }

        /* ── Toolbar ──────────────────────────────────────────────── */
        .flow-toolbar {
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 20px; flex-wrap: wrap;
        }
        .flow-toolbar h2 {
            margin: 0; font-size: 1.05em; font-weight: 700;
            color: var(--text-primary, #333); flex: 1;
        }
        .btn-sm {
            padding: 5px 14px; border-radius: 6px; cursor: pointer;
            font-size: 0.84em; border: 1px solid #667eea;
            background: transparent; color: #667eea;
        }
        .btn-sm:hover { background: #667eea; color: #fff; }
        .flow-error {
            padding: 10px 14px; background: #fff5f5;
            border: 1px solid #f5c6cb; border-radius: 6px;
            color: #c0392b; font-size: 0.87em; margin-bottom: 14px;
        }

        /* ── Pipeline-Diagramm ────────────────────────────────────── */
        .pipeline {
            display: flex; align-items: center; gap: 0;
            overflow-x: auto; padding-bottom: 6px; margin-bottom: 24px;
        }

        .pipe-node {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.09);
            padding: 14px 18px;
            min-width: 130px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: border-color 0.15s, box-shadow 0.15s;
            text-align: center;
        }
        .pipe-node:hover { box-shadow: 0 4px 16px rgba(102,126,234,0.25); }
        .pipe-node.active {
            border-color: #667eea;
            box-shadow: 0 4px 16px rgba(102,126,234,0.3);
        }
        .pipe-node-icon  { font-size: 1.8em; line-height: 1; margin-bottom: 4px; }
        .pipe-node-code  { font-weight: 800; font-size: 0.9em; color: #333; }
        .pipe-node-name  { font-size: 0.72em; color: #888; margin-top: 2px; }
        .pipe-node-stats { font-size: 0.72em; color: #aaa; margin-top: 4px; }
        .pipe-node.active .pipe-node-code { color: #667eea; }

        /* Pfeil mit Job-Count */
        .pipe-arrow {
            display: flex; flex-direction: column; align-items: center;
            padding: 0 4px; cursor: pointer; min-width: 64px; flex-shrink: 0;
            text-align: center;
        }
        .pipe-arrow-sym { font-size: 1.4em; color: #ccc; line-height: 1; }
        .pipe-arrow-label { font-size: 0.68em; color: #aaa; }
        .pipe-arrow-count {
            font-size: 0.75em; font-weight: 700; padding: 1px 6px;
            border-radius: 10px; background: #f0f0f0; color: #666;
            margin-top: 3px;
        }
        .pipe-arrow-count.has-jobs { background: #e8f5e9; color: #27ae60; }
        .pipe-arrow-count.has-errors { background: #fdecea; color: #e74c3c; }

        /* ── Tabellen-Sektion ─────────────────────────────────────── */
        .tables-section {
            background: #fff; border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        .tables-section-header {
            background: linear-gradient(135deg, #667eea22, #764ba222);
            border-bottom: 1px solid #e5e0f8;
            padding: 12px 16px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .tables-section-title { font-weight: 700; font-size: 0.95em; color: #555; }
        .tables-section-stats { font-size: 0.78em; color: #999; }
        .btn-new-etl {
            padding: 5px 12px; border-radius: 6px; font-size: 0.82em;
            background: #667eea; color: #fff; border: none; cursor: pointer;
        }
        .btn-new-etl:hover { background: #5a6fd6; }

        .tables-loading, .tables-empty {
            padding: 30px; text-align: center; color: #aaa; font-size: 0.9em;
        }

        /* ── Tabellen-Row ─────────────────────────────────────────── */
        .table-row {
            display: flex; align-items: center; gap: 10px;
            padding: 9px 16px; border-bottom: 1px solid #f5f5f5;
            font-size: 0.87em; transition: background 0.1s;
        }
        .table-row:last-child { border-bottom: none; }
        .table-row:hover { background: #faf9ff; }
        .table-row.active { background: #ede9fb; }

        /* Status-Arrows (wie Original) */
        .status-arrow {
            font-size: 0.95em; cursor: pointer; padding: 3px 5px;
            border-radius: 4px; transition: background 0.1s; flex-shrink: 0;
        }
        .status-arrow.active:hover { background: #e8f5e9; }
        .status-arrow.inactive:hover { background: #fff3e0; }
        .status-arrow.in.active { color: #27ae60; }
        .status-arrow.in.inactive { color: #e74c3c; }
        .status-arrow.out.active { color: #27ae60; }
        .status-arrow.out.inactive { color: #aaa; }

        .table-row-info { flex: 1; min-width: 0; }
        .table-row-name { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .table-row-meta { font-size: 0.78em; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .table-row-actions { display: flex; gap: 4px; flex-shrink: 0; }
        .btn-modeler {
            padding: 2px 8px; border-radius: 4px; font-size: 0.75em;
            background: #f0f8ff; color: #0984e3; border: 1px solid #b3d9ff;
            cursor: pointer; white-space: nowrap;
        }
        .btn-modeler:hover { background: #0984e3; color: #fff; }

        /* ── Loading ──────────────────────────────────────────────── */
        .flow-loading { text-align: center; padding: 40px; color: #888; font-size: 0.9em; }
    </style>
</head>
<body>
<div class="flow-page">

    <studio-nav active="flow"></studio-nav>

    <div class="flow-body">

        <!-- ── Flow-Bereich ──────────────────────────────────────── -->
        <div class="flow-area">

            <!-- Toolbar -->
            <div class="flow-toolbar">
                <h2>⟳ ETL Flow</h2>
                <button class="btn-sm" id="btn-refresh">↺ Neu laden</button>
                <button class="btn-new-etl" id="btn-new-etl">＋ Neuer ETL-Job</button>
            </div>
            <div class="flow-error" id="flow-error" style="display:none"></div>

            <!-- Pipeline-Diagramm -->
            <div class="pipeline" id="pipeline">
                <div class="flow-loading">⏳ Lade Layer …</div>
            </div>

            <!-- Tabellen-Sektion (wird bei Layer-Klick gefüllt) -->
            <div class="tables-section" id="tables-section" style="display:none">
                <div class="tables-section-header">
                    <span class="tables-section-title" id="tables-section-title">Tabellen</span>
                    <span class="tables-section-stats" id="tables-section-stats"></span>
                </div>
                <div id="tables-content">
                    <div class="tables-loading">Lade …</div>
                </div>
            </div>

        </div>

        <!-- ── Side-Panel (Job-Detail) ───────────────────────────── -->
        <div class="flow-side hidden" id="flow-side">
            <div class="side-header">
                <span class="side-header-title" id="side-title">Job-Detail</span>
                <button class="side-close" id="side-close" title="Schließen">✕</button>
            </div>
            <div class="side-body" id="side-body"></div>
        </div>

    </div>
</div>

<script>
(() => {
'use strict';

// ── State ──────────────────────────────────────────────────────────
let _layers       = [];   // [{layer_id, layer_name, layer_code, ...}]
let _connectionJobs = {}; // { "1:2": [{...}], "2:3": [{...}] }
let _selectedLayer = null;
let _jobDetail     = null;
let _activeJobId   = null;

// ── DOM ────────────────────────────────────────────────────────────
const elPipeline   = document.getElementById('pipeline');
const elTables     = document.getElementById('tables-section');
const elTablesTitle= document.getElementById('tables-section-title');
const elTablesStat = document.getElementById('tables-section-stats');
const elTablesBody = document.getElementById('tables-content');
const elSide       = document.getElementById('flow-side');
const elSideTitle  = document.getElementById('side-title');
const elSideBody   = document.getElementById('side-body');
const elErr        = document.getElementById('flow-error');

// ── Icons pro Layer ────────────────────────────────────────────────
const LAYER_ICONS = { SRC:'🗄️', RAW:'📦', DISC:'🔍', REUS:'♻️', CONS:'📊', META:'🏷️' };
function layerIcon(code) { return LAYER_ICONS[code] ?? '📁'; }

// ── Fehler ─────────────────────────────────────────────────────────
document.addEventListener('studio:api-error', e => showErr(`API-Fehler ${e.detail.status}: ${e.detail.message}`));
function showErr(msg) {
    elErr.textContent = msg; elErr.style.display = 'block';
    setTimeout(() => { elErr.style.display = 'none'; }, 8000);
}
function esc(s) {
    return String(s ?? '')
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Laden ──────────────────────────────────────────────────────────
async function load() {
    elPipeline.innerHTML = '<div class="flow-loading">⏳ Lade Layer …</div>';
    elTables.style.display = 'none';
    closeSide();

    const [layers, allJobs] = await Promise.all([
        window.api.etl.layers().catch(() => []),
        window.api.etl.jobs.list().catch(() => []),
    ]);

    _layers = (Array.isArray(layers) ? layers : [])
        .filter(l => l.layer_id !== 20)  // META-Layer ausblenden (kein sinnvoller Pipeline-Schritt)
        .sort((a, b) => a.layer_sequence - b.layer_sequence);

    const jobs = Array.isArray(allJobs) ? allJobs : (allJobs?.items ?? []);

    // Jobs pro Verbindung (src_layer → tgt_layer) vorindexieren
    _connectionJobs = {};
    for (const j of jobs) {
        if (j.source_layer_id != null && j.target_layer_id != null) {
            const key = `${j.source_layer_id}:${j.target_layer_id}`;
            (_connectionJobs[key] ??= []).push(j);
        }
    }

    renderPipeline();
}

// ── Pipeline rendern ───────────────────────────────────────────────
function renderPipeline() {
    elPipeline.innerHTML = '';

    _layers.forEach((layer, idx) => {

        // ── Pfeil mit Job-Count ──────────────────────────────────
        if (idx > 0) {
            const prev = _layers[idx - 1];
            const key  = `${prev.layer_id}:${layer.layer_id}`;
            const connJobs = _connectionJobs[key] ?? [];
            const errCnt   = connJobs.filter(j => {
                const s = (j.last_run_status ?? '').toLowerCase();
                return s === 'failed' || s === 'error';
            }).length;

            const arrow = document.createElement('div');
            arrow.className = 'pipe-arrow';
            const cntClass = connJobs.length === 0 ? '' : errCnt > 0 ? 'has-errors' : 'has-jobs';
            arrow.innerHTML = `
                <span class="pipe-arrow-sym">→</span>
                <span class="pipe-arrow-label">${prev.layer_code}→${layer.layer_code}</span>
                <span class="pipe-arrow-count ${cntClass}">${connJobs.length} Jobs</span>`;
            // Klick auf Pfeil: zeigt Jobs dieser Verbindung
            arrow.addEventListener('click', () => showConnectionJobs(prev, layer, connJobs));
            elPipeline.appendChild(arrow);
        }

        // ── Layer-Node ───────────────────────────────────────────
        // Tabellen-Count: Tabellen wo dieser Layer als Target (has_job) oder Source ist
        const node = document.createElement('div');
        node.className = 'pipe-node' + (_selectedLayer?.layer_id === layer.layer_id ? ' active' : '');
        node.dataset.layerId = layer.layer_id;
        node.innerHTML = `
            <div class="pipe-node-icon">${layerIcon(layer.layer_code)}</div>
            <div class="pipe-node-code">${esc(layer.layer_code)}</div>
            <div class="pipe-node-name">${esc(layer.layer_name)}</div>
            <div class="pipe-node-stats" id="pstat-${layer.layer_id}">…</div>`;
        node.addEventListener('click', () => selectLayer(layer));
        elPipeline.appendChild(node);

        // Tabellen-Count async laden
        loadLayerStats(layer);
    });
}

async function loadLayerStats(layer) {
    const el = document.getElementById(`pstat-${layer.layer_id}`);
    if (!el) return;
    try {
        const tables = await window.api.jobs.layerTables(layer.layer_id).catch(() => null);
        if (tables && Array.isArray(tables)) {
            const withJob = tables.filter(t => t.has_job).length;
            el.textContent = `${tables.length} Tabellen · ${withJob} befüllt`;
        }
    } catch { /* ignore */ }
}

// ── Layer anklicken → Tabellen darunter ───────────────────────────
async function selectLayer(layer) {
    _selectedLayer = layer;

    // Aktiv-Markierung im Pipeline
    document.querySelectorAll('.pipe-node').forEach(n => {
        n.classList.toggle('active', Number(n.dataset.layerId) === layer.layer_id);
    });

    // Sektion anzeigen, Laden starten
    elTablesTitle.textContent = `${layerIcon(layer.layer_code)} ${layer.layer_name} – Tabellen`;
    elTablesStat.textContent  = '';
    elTablesBody.innerHTML    = '<div class="tables-loading">⏳ Lade Tabellen …</div>';
    elTables.style.display    = 'block';
    elTables.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

    try {
        const tables = await window.api.jobs.layerTables(layer.layer_id);
        renderTables(tables ?? [], layer);
    } catch (e) {
        elTablesBody.innerHTML = `<div class="tables-empty">⚠️ Fehler: ${esc(e.message)}</div>`;
    }
}

// ── Layer→Layer Verbindungs-Jobs zeigen ───────────────────────────
function showConnectionJobs(srcLayer, tgtLayer, jobs) {
    _selectedLayer = null;
    document.querySelectorAll('.pipe-node').forEach(n => n.classList.remove('active'));

    elTablesTitle.textContent = `${layerIcon(srcLayer.layer_code)} ${srcLayer.layer_code} → ${layerIcon(tgtLayer.layer_code)} ${tgtLayer.layer_code} – ETL-Jobs`;
    elTablesStat.textContent  = `${jobs.length} Jobs`;
    elTables.style.display    = 'block';
    elTables.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

    if (jobs.length === 0) {
        elTablesBody.innerHTML = '<div class="tables-empty">Keine Jobs für diese Verbindung.</div>';
        return;
    }

    renderConnectionJobRows(jobs);
}

function renderConnectionJobRows(jobs) {
    const rows = jobs.map(job => {
        const s = (job.last_run_status ?? '').toLowerCase();
        let dotColor = '#ccc';
        if (s === 'ok' || s === 'success' || s === 'completed') dotColor = '#27ae60';
        else if (s === 'failed' || s === 'error') dotColor = '#e74c3c';
        else if (s === 'running') dotColor = '#f39c12';

        const src = esc(job.source_table_name ?? '—');
        const tgt = esc(job.target_table_name ?? '—');

        return `
        <div class="table-row ${job.etl_job_id === _activeJobId ? 'active' : ''}"
             data-job-id="${job.etl_job_id}" style="cursor:pointer">
            <span style="width:8px;height:8px;border-radius:50%;background:${dotColor};flex-shrink:0;display:inline-block"></span>
            <div class="table-row-info">
                <div class="table-row-name">${esc(job.job_name)}</div>
                <div class="table-row-meta">${src} → ${tgt}</div>
            </div>
            <div class="table-row-actions">
                <button class="btn-modeler" onclick="openModelerForJob(${job.etl_job_id})">⬡ Modeler</button>
            </div>
        </div>`;
    }).join('');

    elTablesBody.innerHTML = rows;
    elTablesBody.querySelectorAll('.table-row').forEach(row => {
        row.addEventListener('click', (e) => {
            if (e.target.closest('button')) return;
            const id = Number(row.dataset.jobId);
            const job = jobs.find(j => j.etl_job_id === id);
            if (job) openJobDetail(job);
        });
    });
}

// ── Tabellen rendern (Layer-View) ──────────────────────────────────
function renderTables(tables, layer) {
    const withJob    = tables.filter(t => t.has_job).length;
    const asSource   = tables.filter(t => t.is_used_as_source).length;
    elTablesStat.textContent = `${tables.length} Tabellen · ${withJob} befüllt · ${asSource} als Source`;

    if (tables.length === 0) {
        elTablesBody.innerHTML = '<div class="tables-empty">📭 Keine Tabellen in diesem Layer.</div>';
        return;
    }

    const rows = tables.map(table => {
        // Status bestimmen
        let metaInfo = '';
        if (table.has_job && table.is_used_as_source) {
            metaInfo = `⬅ ${esc(table.job_name ?? '')}  ➡ ${esc(table.downstream_target_table ?? '')}`;
        } else if (table.has_job) {
            metaInfo = `⬅ ${esc(table.job_name ?? '')} (Endpunkt)`;
        } else if (table.is_used_as_source) {
            metaInfo = `Nicht befüllt ➡ ${esc(table.downstream_target_table ?? '')}`;
        } else {
            metaInfo = 'Nicht verbunden';
        }

        return `
        <div class="table-row" data-table-id="${table.table_id}" data-job-id="${table.job_id ?? ''}">
            <span class="status-arrow in ${table.has_job ? 'active' : 'inactive'}"
                  title="${table.has_job ? 'Job öffnen: ' + esc(table.job_name ?? '') : 'Kein befüllender Job'}"
                  data-action="open-job" data-job-id="${table.job_id ?? ''}">
                ${table.has_job ? '🟢⬅' : '🔴⬅'}
            </span>
            <div class="table-row-info">
                <div class="table-row-name">${esc(table.table_name)}</div>
                <div class="table-row-meta">${metaInfo}</div>
            </div>
            <div class="table-row-actions">
                <button class="btn-modeler"
                        onclick="openModeler(${table.table_id}, '${esc(table.table_name)}')">⬡</button>
                ${!table.has_job ? `<button class="btn-sm" style="font-size:0.75em;padding:2px 8px"
                        onclick="openWizardForTable(${table.table_id}, '${esc(table.table_name)}', ${layer.layer_id})">+ ETL</button>` : ''}
            </div>
            <span class="status-arrow out ${table.is_used_as_source ? 'active' : 'inactive'}"
                  title="${table.is_used_as_source ? 'Downstream-Job: ' + esc(table.downstream_job_name ?? '') : 'Wird nicht als Source genutzt'}"
                  data-action="open-downstream" data-job-id="${table.downstream_job_id ?? ''}">
                ${table.is_used_as_source ? '🟢➡' : '⬜➡'}
            </span>
        </div>`;
    }).join('');

    elTablesBody.innerHTML = rows;

    // Klick auf ⬅/➡ Pfeile
    elTablesBody.querySelectorAll('.status-arrow[data-action="open-job"]').forEach(el => {
        el.addEventListener('click', () => {
            const jid = Number(el.dataset.jobId);
            if (jid) openJobDetailById(jid);
        });
    });
    elTablesBody.querySelectorAll('.status-arrow[data-action="open-downstream"]').forEach(el => {
        el.addEventListener('click', () => {
            const jid = Number(el.dataset.jobId);
            if (jid) openJobDetailById(jid);
        });
    });
}

// ── Job-Detail im Side-Panel öffnen ───────────────────────────────
async function openJobDetailById(jobId) {
    try {
        const job = await window.api.etl.jobs.get(jobId);
        if (job) openJobDetail(job);
    } catch { showErr('Job konnte nicht geladen werden.'); }
}

function openJobDetail(job) {
    _activeJobId = job.etl_job_id;
    // Aktiv-Markierung
    document.querySelectorAll('.table-row').forEach(r => {
        r.classList.toggle('active', Number(r.dataset.jobId) === job.etl_job_id);
    });

    elSideTitle.textContent = job.job_name;
    elSide.classList.remove('hidden');

    if (!_jobDetail) _jobDetail = new JobDetail(elSideBody);
    _jobDetail.load(job.etl_job_id);
}

function openModeler(tableId, tableName) {
    window.location = `modeler.html?table_id=${tableId}`;
}

function openModelerForJob(jobId) {
    window.location = `modeler.html`;
}

function openWizardForTable(tableId, tableName, layerId) {
    ETLWizard.openModal({ sourceTableId: tableId, sourceLayerId: layerId });
}

function closeSide() {
    elSide.classList.add('hidden');
    _activeJobId = null;
    if (_jobDetail) { _jobDetail.clear?.(); _jobDetail = null; }
}

// ── Neuer ETL-Job Button ───────────────────────────────────────────
function openWizardGeneral() {
    ETLWizard.openModal({});
}

// ── Events ────────────────────────────────────────────────────────
document.getElementById('btn-refresh').addEventListener('click', load);
document.getElementById('btn-new-etl').addEventListener('click', openWizardGeneral);
document.getElementById('side-close').addEventListener('click', closeSide);

document.addEventListener('studio:job-created', () => load());
document.addEventListener('studio:job-deleted', () => { closeSide(); load(); });

// ── Init ───────────────────────────────────────────────────────────
load();
})();
</script>
</body>
</html>
