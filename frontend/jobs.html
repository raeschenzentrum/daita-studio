<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>daita-studio – Jobs</title>
    <link rel="stylesheet" href="style.css">
    <script src="config.js"></script>
    <script src="components/api.js"></script>
    <script src="components/nav-header.js"></script>
    <script src="components/job-list.js"></script>
    <script src="components/job-detail.js?v=6"></script>
    <script src="components/column-selector.js?v=6"></script>
    <script src="components/etl-wizard.js?v=7"></script>
    <style>
        /* ── Layout ───────────────────────────────────────────────── */
        body   { margin: 0; background: var(--bg-color, #f0f2f5); }
        .jobs-page { display: flex; flex-direction: column; min-height: 100vh; }
        .jobs-main  { flex: 1; display: flex; flex-direction: column; padding: 16px; gap: 14px;
                      max-width: 1600px; margin: 0 auto; width: 100%; box-sizing: border-box; }

        /* ── Tabs ─────────────────────────────────────────────────── */
        .page-tabs {
            display: flex; gap: 4px;
            background: var(--card-bg, #fff);
            border-radius: 10px; padding: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.07);
        }
        .page-tab {
            padding: 7px 20px; border-radius: 7px; border: none; cursor: pointer;
            font-size: 0.87em; font-weight: 600; background: transparent;
            color: var(--text-secondary, #888); transition: all 0.15s;
        }
        .page-tab:hover  { background: #f0f2ff; color: #667eea; }
        .page-tab.active { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }

        /* ── Tab-Panes ────────────────────────────────────────────── */
        .tab-pane { display: none; }
        .tab-pane.active { display: flex; flex: 1; gap: 14px; min-height: 0; }

        /* ── Split-Layout (Liste | Detail) ────────────────────────── */
        .split-left {
            width: 340px; flex-shrink: 0;
            background: var(--card-bg, #fff);
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.07);
            display: flex; flex-direction: column;
            overflow: hidden; min-height: 500px;
        }
        .split-left-header {
            padding: 10px 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff; font-weight: 700; font-size: 0.88em;
            display: flex; align-items: center; justify-content: space-between;
            flex-shrink: 0;
        }
        .btn-add {
            padding: 4px 10px; border: 1px solid rgba(255,255,255,0.6);
            border-radius: 5px; background: transparent; color: #fff;
            cursor: pointer; font-size: 0.8em;
        }
        .btn-add:hover { background: rgba(255,255,255,0.2); }
        .split-body { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

        .split-right {
            flex: 1; min-width: 0;
            background: var(--card-bg, #fff);
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.07);
            overflow: hidden; display: flex; flex-direction: column;
        }
        .split-right-empty {
            flex: 1; display: flex; align-items: center; justify-content: center;
            flex-direction: column; gap: 10px; color: #bbb;
        }
        .split-right-empty-icon { font-size: 3em; }

        /* ── Templates Tab ────────────────────────────────────────── */
        /* Split-Layout: Liste links, Detail rechts */
        #tab-templates { gap: 0; }
        .tpl-split-left {
            width: 280px; flex-shrink: 0;
            background: var(--card-bg, #fff);
            border-radius: 10px 0 0 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,.07);
            display: flex; flex-direction: column; overflow: hidden;
        }
        .tpl-split-left-header {
            padding: 10px 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff; font-weight: 700; font-size: 0.88em;
            display: flex; align-items: center; justify-content: space-between;
            flex-shrink: 0;
        }
        .tpl-list { flex: 1; overflow-y: auto; }
        .tpl-list-item {
            padding: 9px 14px; cursor: pointer; font-size: 0.84em;
            border-bottom: 1px solid var(--border-color, #eee);
            display: flex; align-items: center; gap: 8px;
        }
        .tpl-list-item:hover { background: #f4f0ff; }
        .tpl-list-item.active { background: #ede8ff; font-weight: 700; color: #667eea; }
        .tpl-list-item-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .tpl-badge {
            font-size: 0.68em; padding: 2px 6px; border-radius: 4px;
            font-weight: 700; flex-shrink: 0;
        }
        .tpl-badge.scd2 { background: #6c5ce7; color: #fff; }
        .tpl-badge.scd1 { background: #0984e3; color: #fff; }
        .tpl-badge.full { background: #00b894; color: #fff; }
        /* Vertikaler Divider */
        .tpl-divider {
            width: 4px; flex-shrink: 0; cursor: col-resize;
            background: var(--border-color, #ddd);
            transition: background 0.15s;
        }
        .tpl-divider:hover, .tpl-divider.dragging { background: linear-gradient(180deg, #667eea, #764ba2); }
        /* Rechte Detail-Seite */
        .tpl-split-right {
            flex: 1; min-width: 0;
            background: var(--card-bg, #fff);
            border-radius: 0 10px 10px 0;
            box-shadow: 0 2px 8px rgba(0,0,0,.07);
            display: flex; flex-direction: column; overflow: hidden;
        }
        .tpl-detail-header {
            padding: 10px 16px;
            background: linear-gradient(135deg, #667eea22, #764ba222);
            border-bottom: 1px solid #e8e4fb;
            display: flex; align-items: center; gap: 10px; flex-shrink: 0;
        }
        .tpl-detail-title { font-weight: 700; font-size: 0.92em; color: #764ba2; flex: 1; }
        .tpl-detail-body { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 16px; }
        /* Meta-Formular */
        .tpl-meta-form { display: grid; grid-template-columns: 120px 1fr; gap: 6px 12px; align-items: center; font-size: 0.85em; }
        .tpl-meta-form label { font-weight: 600; color: var(--text-secondary, #888); }
        .tpl-meta-form input, .tpl-meta-form textarea {
            padding: 5px 8px; border: 1px solid var(--border-color, #ddd);
            border-radius: 5px; font-size: 0.9em;
            background: var(--bg-color, #f8f8f8); color: var(--text-primary, #333);
            width: 100%;
        }
        .tpl-meta-form textarea { resize: vertical; min-height: 48px; }
        /* Sections */
        .tpl-section-title {
            font-weight: 700; font-size: 0.8em; text-transform: uppercase;
            color: var(--text-secondary, #888); letter-spacing: 0.05em;
            margin-bottom: 8px; display: flex; align-items: center; gap: 8px;
        }
        /* Steps-Tabelle */
        .tpl-steps-table { width: 100%; border-collapse: collapse; font-size: 0.82em; }
        .tpl-steps-table th, .tpl-steps-table td {
            padding: 6px 10px; border-bottom: 1px solid var(--border-color, #eee); text-align: left;
        }
        .tpl-steps-table th { background: var(--bg-color, #f5f5f5); font-weight: 700; }
        .tpl-steps-table tr:hover td { background: #f9f6ff; }
        .tpl-step-inline-edit input {
            padding: 3px 6px; border: 1px solid #b39ddb; border-radius: 4px;
            font-size: 0.95em; width: 100%;
            background: var(--bg-color, #f8f8f8); color: var(--text-primary, #333);
        }
        /* SQL-Dateien */
        .tpl-sql-list { display: flex; flex-direction: column; gap: 4px; }
        .tpl-sql-item {
            display: flex; align-items: center; gap: 8px; padding: 5px 8px;
            border: 1px solid var(--border-color, #eee); border-radius: 6px;
            font-size: 0.81em;
        }
        .tpl-sql-path { flex: 1; font-family: monospace; color: #555; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        /* SQL-Preview */
        .tpl-sql-preview {
            background: #1e1e1e; color: #d4d4d4;
            border-radius: 6px; padding: 10px 12px;
            font-family: monospace; font-size: 0.8em;
            white-space: pre-wrap; max-height: 300px; overflow-y: auto;
            margin-top: 6px;
        }
        .tpl-sql-editor {
            width: 100%; min-height: 200px; max-height: 420px;
            font-family: monospace; font-size: 0.8em; line-height: 1.5;
            background: #1e1e1e; color: #d4d4d4;
            border: 1px solid #444; border-radius: 6px; padding: 10px 12px;
            resize: vertical; box-sizing: border-box; margin-top: 6px;
        }
        .tpl-sql-save-row {
            display: flex; gap: 6px; align-items: center; margin-top: 4px;
        }
        /* Aktions-Buttons */
        .tpl-detail-actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn-tpl-save   { padding: 5px 14px; background: #667eea; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 0.82em; }
        .btn-tpl-save:hover { background: #5a6fd6; }
        .btn-tpl-export { padding: 5px 14px; border: 1px solid #667eea; color: #667eea; border-radius: 6px; background: transparent; cursor: pointer; font-size: 0.82em; }
        .btn-tpl-export:hover { background: #f0f0ff; }
        .btn-tpl-delete { padding: 5px 14px; border: 1px solid #e74c3c; color: #e74c3c; border-radius: 6px; background: transparent; cursor: pointer; font-size: 0.82em; margin-left: auto; }
        .btn-tpl-delete:hover { background: #e74c3c; color: #fff; }
        .btn-tpl-icon { padding: 3px 7px; border: 1px solid var(--border-color, #ddd); border-radius: 4px; background: transparent; cursor: pointer; font-size: 0.78em; }
        .btn-tpl-icon:hover { background: #f4f0ff; border-color: #667eea; }
        .btn-tpl-icon.danger:hover { background: #fff0f0; border-color: #e74c3c; color: #e74c3c; }
        .tpl-empty-detail {
            flex: 1; display: flex; align-items: center; justify-content: center;
            flex-direction: column; gap: 10px; color: #bbb; font-size: 0.9em;
        }
        .tpl-msg { padding: 8px 12px; border-radius: 6px; font-size: 0.83em; margin-top: 6px; }
        .tpl-msg.ok  { background: #d4edda; color: #155724; }
        .tpl-msg.err { background: #f8d7da; color: #721c24; }
        .tpl-loading, .tpl-empty { padding: 40px; text-align: center; color: var(--text-secondary, #888); font-size: 0.9em; }

        /* ── History Tab ──────────────────────────────────────────── */
        .history-toolbar {
            display: flex; gap: 8px; padding: 10px 14px;
            background: var(--bg-color, #f8f9fa);
            border-bottom: 1px solid var(--border-color, #e0e0e0);
            flex-wrap: wrap;
        }
        .history-toolbar select, .history-toolbar input {
            padding: 5px 8px; border: 1px solid var(--border-color, #ddd);
            border-radius: 6px; font-size: 0.85em;
            background: var(--card-bg, #fff); color: var(--text-primary, #333);
        }
        .history-table-wrap { flex: 1; overflow: auto; }
        .history-table {
            width: 100%; border-collapse: collapse; font-size: 0.83em;
        }
        .history-table th, .history-table td {
            padding: 7px 12px; border-bottom: 1px solid var(--border-color, #eee);
            text-align: left; white-space: nowrap;
        }
        .history-table th {
            background: var(--bg-color, #f5f5f5); font-weight: 700;
            position: sticky; top: 0; z-index: 1;
        }
        .history-table tr:hover td { background: #f4f0ff; }
        .run-dot {
            width: 9px; height: 9px; border-radius: 50%; display: inline-block;
            vertical-align: middle; margin-right: 5px;
        }
        .run-dot.ok      { background: #27ae60; }
        .run-dot.error   { background: #e74c3c; }
        .run-dot.running { background: #f39c12; }
        .run-dot.never   { background: #bbb; }
        .history-empty {
            padding: 40px; text-align: center;
            color: var(--text-secondary, #888); font-size: 0.9em;
        }

        /* ── Error Banner ─────────────────────────────────────────── */
        .page-error {
            padding: 10px 14px; background: #fff5f5;
            border: 1px solid #f5c6cb; border-radius: 8px;
            color: #c0392b; font-size: 0.87em; display: none;
        }
    </style>
</head>
<body>
<div class="jobs-page">

    <studio-nav active="jobs"></studio-nav>

    <main class="jobs-main">

        <!-- Fehler-Banner -->
        <div class="page-error" id="page-error"></div>

        <!-- Tab-Leiste -->
        <div class="page-tabs">
            <button class="page-tab active" data-tab="tab-jobs">⚙ Jobs</button>
            <button class="page-tab"        data-tab="tab-templates">📋 Templates</button>
            <button class="page-tab"        data-tab="tab-history">🕒 History</button>
        </div>

        <!-- ── Tab: Jobs ─────────────────────────────────────────── -->
        <div class="tab-pane active" id="tab-jobs">
            <!-- Liste links -->
            <div class="split-left">
                <div class="split-left-header">
                    <span>ETL-Jobs</span>
                    <button class="btn-add" id="btn-new-job">＋ Neuer Job</button>
                </div>
                <div class="split-body" id="job-list-container"></div>
            </div>
            <!-- Detail rechts -->
            <div class="split-right" id="job-detail-container">
                <div class="split-right-empty">
                    <div class="split-right-empty-icon">⚙</div>
                    <div>Job aus der Liste auswählen</div>
                </div>
            </div>
        </div>

        <!-- ── Tab: Templates ────────────────────────────────────── -->
        <div class="tab-pane" id="tab-templates">
            <!-- Linke Liste -->
            <div class="tpl-split-left">
                <div class="tpl-split-left-header">
                    <span>📋 Job-Templates</span>
                    <div style="display:flex;gap:5px">
                        <button class="btn-add" id="btn-tpl-import-zip" title="ZIP importieren">⬆ ZIP</button>
                        <button class="btn-add" id="btn-tpl-new" title="Neues Template">+ Neu</button>
                    </div>
                </div>
                <div class="tpl-list" id="tpl-list">
                    <div class="tpl-loading">⏳ Lade…</div>
                </div>
            </div>
            <!-- Resize-Handle -->
            <div class="tpl-divider" id="tpl-divider"></div>
            <!-- Rechtes Detail -->
            <div class="tpl-split-right" id="tpl-detail">
                <div class="tpl-empty-detail">
                    <div style="font-size:2.5em">📋</div>
                    <div>Template aus der Liste wählen</div>
                </div>
            </div>
        </div>

        <!-- ── Tab: History ──────────────────────────────────────── -->
        <div class="tab-pane" id="tab-history">
            <div style="flex:1;background:var(--card-bg,#fff);border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.07);display:flex;flex-direction:column;overflow:hidden">
                <div class="history-toolbar">
                    <select id="hist-status">
                        <option value="">Alle Status</option>
                        <option value="ok">✅ OK</option>
                        <option value="error">❌ Fehler</option>
                        <option value="running">⏳ Läuft</option>
                    </select>
                    <select id="hist-limit">
                        <option value="50">50 Einträge</option>
                        <option value="100">100 Einträge</option>
                        <option value="200">200 Einträge</option>
                    </select>
                    <button class="page-tab" id="btn-hist-refresh" style="padding:5px 12px">↺ Neu laden</button>
                </div>
                <div class="history-table-wrap">
                    <table class="history-table">
                        <thead>
                            <tr>
                                <th>Status</th>
                                <th>Job</th>
                                <th>Source → Target</th>
                                <th>Start</th>
                                <th>Dauer</th>
                                <th>Zeilen</th>
                                <th>Run-ID</th>
                            </tr>
                        </thead>
                        <tbody id="hist-tbody">
                            <tr><td colspan="7" class="history-empty">⏳ Lade History…</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </main>
</div>

<script>
(() => {
'use strict';

// ── State ─────────────────────────────────────────────────────────
let _jobDetail = null;
let _selectedJobId = null;
let _jobList   = null;

// ── Fehler ────────────────────────────────────────────────────────
document.addEventListener('studio:api-error', e => showError(`API-Fehler ${e.detail.status}: ${e.detail.message}`));
function showError(msg) {
    const el = document.getElementById('page-error');
    el.textContent = msg; el.style.display = 'block';
    setTimeout(() => { el.style.display = 'none'; }, 8000);
}

// ── Tab-Switching ─────────────────────────────────────────────────
document.querySelectorAll('.page-tab[data-tab]').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.page-tab[data-tab]').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        const pane = document.getElementById(btn.dataset.tab);
        if (pane) pane.classList.add('active');
        // Lazy-Load
        if (btn.dataset.tab === 'tab-templates') loadTemplates();
        if (btn.dataset.tab === 'tab-history')   loadHistory();
    });
});

// ── Jobs Tab ──────────────────────────────────────────────────────
function initJobsTab() {
    const listContainer   = document.getElementById('job-list-container');
    const detailContainer = document.getElementById('job-detail-container');

    _jobList = new JobList(listContainer, {
        onSelect: (jobId) => {
            _selectedJobId = jobId;
            detailContainer.innerHTML = '';
            _jobDetail = new JobDetail(detailContainer);
            _jobDetail.load(jobId);
        },
    });
    _jobList.load();

    document.getElementById('btn-new-job').addEventListener('click', () => {
        ETLWizard.openModal({});
    });

    // Nach Wizard-Erfolg → Liste neu laden + neuen Job selektieren
    document.addEventListener('studio:job-created', e => {
        _jobList.load();
        if (e.detail?.job_id) {
            setTimeout(() => {
                _jobList.setSelected(e.detail.job_id);
                detailContainer.innerHTML = '';
                _jobDetail = new JobDetail(detailContainer);
                _jobDetail.load(e.detail.job_id);
            }, 600);
        }
    });

    // Nach Job-Löschung → Detail leeren, Liste neu laden
    document.addEventListener('studio:job-deleted', () => {
        _selectedJobId = null;
        detailContainer.innerHTML = `
            <div class="split-right-empty">
                <div class="split-right-empty-icon">⚙</div>
                <div>Job aus der Liste auswählen</div>
            </div>`;
        _jobList.load();
    });
}

// ── Templates Tab ─────────────────────────────────────────────────
let _tplSelectedId = null;
let _tplTemplates  = [];

async function loadTemplates() {
    const listEl = document.getElementById('tpl-list');
    listEl.innerHTML = '<div class="tpl-loading">⏳ Lade…</div>';
    try {
        _tplTemplates = await window.api.templates.listJobs();
        _renderTplList(_tplTemplates);
    } catch (err) {
        listEl.innerHTML = `<div class="tpl-loading" style="color:#e74c3c">Fehler: ${escHtml(err.message)}</div>`;
    }
}

function _renderTplList(templates) {
    const listEl = document.getElementById('tpl-list');
    if (!templates.length) {
        listEl.innerHTML = '<div class="tpl-loading">Keine Templates vorhanden.</div>';
        return;
    }
    listEl.innerHTML = templates.map(t => {
        const ht = (t.historization_type || t.template_code || 'TPL').split('_').pop().toLowerCase();
        return `<div class="tpl-list-item${t.template_id === _tplSelectedId ? ' active' : ''}"
                     data-id="${t.template_id}">
            <span class="tpl-list-item-name">${escHtml(t.template_name || t.template_code)}</span>
            <span class="tpl-badge ${ht}">${escHtml(t.template_code || '')}</span>
        </div>`;
    }).join('');
    listEl.querySelectorAll('.tpl-list-item').forEach(el => {
        el.addEventListener('click', () => {
            _tplSelectedId = parseInt(el.dataset.id);
            _renderTplList(_tplTemplates);
            _loadTplDetail(_tplSelectedId);
        });
    });
}

async function _loadTplDetail(templateId) {
    const detailEl = document.getElementById('tpl-detail');
    detailEl.innerHTML = '<div class="tpl-empty-detail"><div>⏳ Lade…</div></div>';
    try {
        const [tpl, steps] = await Promise.all([
            window.api.templates.getJob(templateId),
            window.api.templates.listSteps({ template_id: templateId })
        ]);
        // SQL-Dateien aller Steps sammeln
        const sqlPaths = [...new Set(steps.map(s => s.sql_template_path).filter(Boolean))];
        _renderTplDetail(tpl, steps, sqlPaths, detailEl);
    } catch (err) {
        detailEl.innerHTML = `<div class="tpl-empty-detail" style="color:#e74c3c">Fehler: ${escHtml(err.message)}</div>`;
    }
}

function _renderTplDetail(tpl, steps, sqlPaths, container) {
    container.innerHTML = `
        <div class="tpl-detail-header">
            <span class="tpl-detail-title">📋 ${escHtml(tpl.template_name || tpl.template_code)}</span>
            <div class="tpl-detail-actions">
                <button class="tpl-btn-use btn-tpl-save" id="btn-tpl-use">▶ Verwenden</button>
                <button class="btn-tpl-export" id="btn-tpl-export">⬇ ZIP Export</button>
                <button class="btn-tpl-delete" id="btn-tpl-delete">🗑 Löschen</button>
            </div>
        </div>
        <div class="tpl-detail-body">
            <!-- Metadaten -->
            <div>
                <div class="tpl-section-title">ℹ Metadaten</div>
                <div class="tpl-meta-form" id="tpl-meta-form">
                    <label>Name</label>
                    <input type="text" id="tpl-meta-name" value="${escHtml(tpl.template_name || '')}">
                    <label>Code</label>
                    <input type="text" id="tpl-meta-code" value="${escHtml(tpl.template_code || '')}" readonly style="opacity:.6">
                    <label>Kategorie</label>
                    <input type="text" id="tpl-meta-cat" value="${escHtml(tpl.category || '')}">
                    <label>Beschreibung</label>
                    <textarea id="tpl-meta-desc">${escHtml(tpl.beschreibung || tpl.description || '')}</textarea>
                </div>
                <div style="margin-top:8px;display:flex;gap:8px;align-items:center">
                    <button class="btn-tpl-save" id="btn-tpl-meta-save">💾 Metadaten speichern</button>
                    <span id="tpl-meta-msg" class="tpl-msg" style="display:none"></span>
                </div>
            </div>

            <!-- Steps -->
            <div>
                <div class="tpl-section-title">
                    ⚡ Steps (${steps.length})
                    <button class="btn-tpl-icon" id="btn-tpl-step-add" title="Step hinzufügen">+ Step</button>
                </div>
                <table class="tpl-steps-table" id="tpl-steps-table">
                    <thead><tr>
                        <th>#</th><th>Name</th><th>SQL-Pfad</th><th>Parameter</th><th>Aktionen</th>
                    </tr></thead>
                    <tbody id="tpl-steps-tbody">
                        ${steps.length ? '' : '<tr><td colspan="4" style="text-align:center;color:#aaa;padding:16px">Keine Steps</td></tr>'}
                    </tbody>
                </table>
            </div>

            <!-- SQL-Template-Dateien -->
            <div>
                <div class="tpl-section-title">📄 SQL-Template-Dateien (${sqlPaths.length})</div>
                <div class="tpl-sql-list" id="tpl-sql-list">
                    ${!sqlPaths.length ? '<div style="font-size:0.82em;color:#aaa">Keine SQL-Dateien referenziert</div>' : ''}
                </div>
            </div>
        </div>`;

    // Steps rendern
    _renderTplStepsRows(steps, document.getElementById('tpl-steps-tbody'), tpl.template_id);

    // SQL-Dateien rendern
    if (sqlPaths.length) {
        const sqlList = document.getElementById('tpl-sql-list');
        sqlPaths.forEach(path => {
            const item = document.createElement('div');
            item.className = 'tpl-sql-item';
            item.innerHTML = `<span class="tpl-sql-path">${escHtml(path)}</span>
                <button class="btn-tpl-icon" title="Bearbeiten">✏️</button>`;
            item.querySelector('button').addEventListener('click', async () => {
                // Toggle: Editor entfernen wenn bereits offen
                const existing = item.nextElementSibling;
                if (existing && existing.classList.contains('tpl-sql-edit-block')) {
                    existing.remove(); return;
                }
                const block = document.createElement('div');
                block.className = 'tpl-sql-edit-block';
                block.innerHTML = `<textarea class="tpl-sql-editor" spellcheck="false">Lade…</textarea>
                    <div class="tpl-sql-save-row">
                        <button class="btn-tpl-save" id="btn-sql-save">&#x1F4BE; Speichern</button>
                        <span id="sql-save-msg" style="font-size:0.8em;display:none"></span>
                        <button class="btn-tpl-icon" id="btn-sql-close" style="margin-left:auto">&#x2715; Schließen</button>
                    </div>`;
                item.after(block);
                const ta  = block.querySelector('textarea');
                const msg = block.querySelector('#sql-save-msg');
                block.querySelector('#btn-sql-close').addEventListener('click', () => block.remove());
                // Inhalt laden
                try {
                    const r = await window.api.etl.sqlTemplates.get(path);
                    ta.value = r.content || '';
                } catch(err) {
                    ta.value = ''; showError('Laden fehlgeschlagen: ' + err.message);
                }
                // Speichern
                block.querySelector('#btn-sql-save').addEventListener('click', async () => {
                    try {
                        await window.api.etl.sqlTemplates.update(path, ta.value);
                        msg.textContent = '✅ Gespeichert'; msg.style.display = ''; msg.style.color = '#27ae60';
                    } catch(err) {
                        msg.textContent = '❌ ' + err.message; msg.style.display = ''; msg.style.color = '#e74c3c';
                    }
                    setTimeout(() => { msg.style.display = 'none'; }, 3000);
                });
            });
            sqlList.appendChild(item);
        });
    }

    // Metadaten speichern
    container.querySelector('#btn-tpl-meta-save').addEventListener('click', async () => {
        const name = container.querySelector('#tpl-meta-name').value.trim();
        const cat  = container.querySelector('#tpl-meta-cat').value.trim();
        const desc = container.querySelector('#tpl-meta-desc').value.trim();
        const msgEl = container.querySelector('#tpl-meta-msg');
        try {
            await window.api.templates.patchJob(tpl.template_id, {
                template_name: name, category: cat, beschreibung: desc
            });
            msgEl.textContent = '✅ Gespeichert'; msgEl.className = 'tpl-msg ok';
            msgEl.style.display = '';
            tpl.template_name = name;
            // Liste aktualisieren
            const t = _tplTemplates.find(x => x.template_id === tpl.template_id);
            if (t) t.template_name = name;
            _renderTplList(_tplTemplates);
        } catch(err) {
            msgEl.textContent = '❌ ' + err.message; msgEl.className = 'tpl-msg err';
            msgEl.style.display = '';
        }
        setTimeout(() => { msgEl.style.display = 'none'; }, 3000);
    });

    // Verwenden
    container.querySelector('#btn-tpl-use').addEventListener('click', () => {
        ETLWizard.openModal({ templateId: tpl.template_id, templateName: tpl.template_name });
    });

    // Export ZIP
    container.querySelector('#btn-tpl-export').addEventListener('click', () => {
        const url = window.METADAITA_CONFIG.backend_url + `/api/templates/export/${tpl.template_id}`;
        const a = document.createElement('a'); a.href = url; a.download = ''; a.click();
    });

    // Löschen
    container.querySelector('#btn-tpl-delete').addEventListener('click', async () => {
        const detailEl = document.getElementById('tpl-detail');
        const confirmRow = document.createElement('div');
        confirmRow.style.cssText = 'padding:10px 16px;background:#fff8f0;border-top:1px solid #f5c6cb;display:flex;gap:8px;align-items:center;font-size:0.83em';
        confirmRow.innerHTML = `<span>Template "${escHtml(tpl.template_name)}" wirklich löschen?</span>
            <button class="btn-tpl-delete" id="tpl-confirm-del" style="padding:3px 10px">✓ Ja, löschen</button>
            <button class="btn-tpl-icon" id="tpl-cancel-del">Abbrechen</button>`;
        detailEl.appendChild(confirmRow);
        confirmRow.querySelector('#tpl-cancel-del').addEventListener('click', () => confirmRow.remove());
        confirmRow.querySelector('#tpl-confirm-del').addEventListener('click', async () => {
            try {
                await window.api.templates.deleteJob(tpl.template_id);
                _tplSelectedId = null;
                document.getElementById('tpl-detail').innerHTML = `<div class="tpl-empty-detail"><div style="font-size:2.5em">📋</div><div>Template gelöscht. Neues auswählen.</div></div>`;
                await loadTemplates();
            } catch(err) { showError('Fehler: ' + err.message); confirmRow.remove(); }
        });
    });

    // Step hinzufügen
    container.querySelector('#btn-tpl-step-add').addEventListener('click', async () => {
        const name = prompt('Step-Name:');
        if (!name) return;
        const path = prompt('SQL-Template-Pfad (z.B. RAW_TO_DISC_SCD2/delete/delete_target_table.sql):');
        try {
            await window.api.templates.createStep({
                template_id: tpl.template_id,
                step_name: name,
                step_order: steps.length + 1,
                sql_template_path: path || null,
            });
            _loadTplDetail(tpl.template_id);
        } catch(err) { showError('Fehler: ' + err.message); }
    });
}

function _renderTplStepsRows(steps, tbody, templateId) {
    if (!steps.length) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#aaa;padding:16px">Keine Steps</td></tr>';
        return;
    }
    tbody.innerHTML = steps.map(s => {
        const pCount = s.default_parameters ? Object.keys(s.default_parameters).length : 0;
        const pLabel = pCount ? `<span style="color:#667eea;font-weight:600">${pCount} Param.</span>` : '<span style="color:#aaa">—</span>';
        return `<tr data-step-id="${s.step_template_id}">
            <td>${s.step_order ?? '—'}</td>
            <td class="tpl-step-name-cell">${escHtml(s.step_name || '—')}</td>
            <td class="tpl-step-path-cell" style="font-family:monospace;font-size:0.85em">${escHtml(s.sql_template_path || '—')}</td>
            <td>${pLabel}</td>
            <td style="white-space:nowrap">
                <button class="btn-tpl-icon tpl-step-params" title="Parameter bearbeiten">{ }</button>
                <button class="btn-tpl-icon tpl-step-edit" title="Bearbeiten">✏</button>
                <button class="btn-tpl-icon danger tpl-step-del" title="Löschen">🗑</button>
            </td>
        </tr>`;}).join('');

    // Parameter-Editor
    tbody.querySelectorAll('.tpl-step-params').forEach((btn, i) => {
        btn.addEventListener('click', async () => {
            const step = steps[i];
            const row  = btn.closest('tr');
            // Toggle
            const existing = row.nextElementSibling;
            if (existing && existing.classList.contains('tpl-params-editor-row')) {
                existing.remove(); btn.classList.remove('active'); return;
            }
            btn.classList.add('active');
            const editorRow = document.createElement('tr');
            editorRow.className = 'tpl-params-editor-row';
            editorRow.innerHTML = `<td colspan="5" style="padding:0">
                <div style="padding:10px 14px;background:#f8f9ff;border-bottom:1px solid #e8e4fb">
                    <div style="font-size:0.78em;font-weight:700;color:#667eea;margin-bottom:6px">
                        📦 Default-Parameter: ${escHtml(step.step_name)}
                        <span style="font-weight:400;color:#999;margin-left:8px">Datei: ${escHtml(step.sql_template_path || '').replace('.sql','.params.json')}</span>
                    </div>
                    <textarea class="tpl-sql-editor" style="min-height:140px" spellcheck="false">Lade…</textarea>
                    <div class="tpl-sql-save-row">
                        <button class="btn-tpl-save" id="btn-params-save">&#x1F4BE; Speichern</button>
                        <span id="params-save-msg" style="font-size:0.8em;display:none"></span>
                        <button class="btn-tpl-icon" id="btn-params-close" style="margin-left:auto">✕ Schließen</button>
                    </div>
                </div>
            </td>`;
            row.after(editorRow);
            const ta  = editorRow.querySelector('textarea');
            const msg = editorRow.querySelector('#params-save-msg');
            editorRow.querySelector('#btn-params-close').addEventListener('click', () => {
                editorRow.remove(); btn.classList.remove('active');
            });
            // Laden
            try {
                const params = await window.api.templates.getStepParams(step.step_template_id);
                ta.value = JSON.stringify(params, null, 2);
            } catch(err) {
                ta.value = JSON.stringify(step.default_parameters || {}, null, 2);
            }
            // Speichern
            editorRow.querySelector('#btn-params-save').addEventListener('click', async () => {
                let parsed;
                try { parsed = JSON.parse(ta.value); } catch(e) {
                    msg.textContent = '❌ Ungültiges JSON: ' + e.message;
                    msg.style.display = ''; msg.style.color = '#e74c3c'; return;
                }
                try {
                    await window.api.templates.saveStepParams(step.step_template_id, parsed);
                    step.default_parameters = parsed;
                    const pCount = Object.keys(parsed).length;
                    row.querySelector('td:nth-child(4)').innerHTML =
                        pCount ? `<span style="color:#667eea;font-weight:600">${pCount} Param.</span>` : '<span style="color:#aaa">—</span>';
                    msg.textContent = '✅ Gespeichert'; msg.style.display = ''; msg.style.color = '#27ae60';
                } catch(err) {
                    msg.textContent = '❌ ' + err.message; msg.style.display = ''; msg.style.color = '#e74c3c';
                }
                setTimeout(() => { msg.style.display = 'none'; }, 3000);
            });
        });
    });

    tbody.querySelectorAll('.tpl-step-edit').forEach((btn, i) => {
        btn.addEventListener('click', () => {
            const step = steps[i];
            const row  = btn.closest('tr');
            const nameCell = row.querySelector('.tpl-step-name-cell');
            const pathCell = row.querySelector('.tpl-step-path-cell');
            if (btn.dataset.editing) {
                // Speichern
                const newName = row.querySelector('.inp-name').value.trim();
                const newPath = row.querySelector('.inp-path').value.trim();
                window.api.templates.patchStep(step.step_template_id, {
                    step_name: newName,
                    sql_template_path: newPath || null,
                }).then(() => {
                    step.step_name = newName; step.sql_template_path = newPath;
                    nameCell.textContent = newName;
                    pathCell.textContent = newPath || '—';
                    btn.textContent = '✏'; delete btn.dataset.editing;
                }).catch(err => showError('Fehler: ' + err.message));
            } else {
                nameCell.innerHTML = `<div class="tpl-step-inline-edit"><input class="inp-name" value="${escHtml(step.step_name || '')}"></div>`;
                pathCell.innerHTML = `<div class="tpl-step-inline-edit"><input class="inp-path" value="${escHtml(step.sql_template_path || '')}" style="width:100%;min-width:200px"></div>`;
                btn.textContent = '💾'; btn.dataset.editing = '1';
            }
        });
    });

    tbody.querySelectorAll('.tpl-step-del').forEach((btn, i) => {
        btn.addEventListener('click', async () => {
            const step = steps[i];
            btn.disabled = true;
            try {
                await window.api.templates.deleteStep(step.step_template_id);
                _loadTplDetail(templateId);
            } catch(err) { showError('Fehler: ' + err.message); btn.disabled = false; }
        });
    });
}

// Resize-Handle für Template-Split
function _initTplResize() {
    const handle = document.getElementById('tpl-divider');
    const left   = document.querySelector('.tpl-split-left');
    if (!handle || !left) return;
    let _startX = 0, _startW = 0;
    handle.addEventListener('mousedown', e => {
        _startX = e.clientX; _startW = left.offsetWidth;
        handle.classList.add('dragging');
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
        const onMove = ev => {
            left.style.width = Math.max(180, Math.min(480, _startW + ev.clientX - _startX)) + 'px';
        };
        const onUp = () => {
            handle.classList.remove('dragging');
            document.body.style.cursor = ''; document.body.style.userSelect = '';
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup', onUp);
        };
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
        e.preventDefault();
    });
}

// ZIP-Import
function _initTplImport() {
    document.getElementById('btn-tpl-import-zip')?.addEventListener('click', () => {
        const inp = document.createElement('input');
        inp.type = 'file'; inp.accept = '.zip';
        inp.onchange = async () => {
            const file = inp.files[0]; if (!file) return;
            const form = new FormData(); form.append('file', file);
            try {
                const r = await fetch(window.METADAITA_CONFIG.backend_url + '/api/templates/import', {
                    method: 'POST', body: form
                }).then(r => r.json());
                if (r.error || r.detail) { showError('Import-Fehler: ' + (r.detail || r.error)); return; }
                alert(`✅ Template "${r.template_code || ''}" importiert`);
                await loadTemplates();
            } catch(err) { showError('Import fehlgeschlagen: ' + err.message); }
        };
        inp.click();
    });
    document.getElementById('btn-tpl-new')?.addEventListener('click', () => {
        const name = prompt('Template-Name:'); if (!name) return;
        const code = prompt('Template-Code (z.B. RAW_TO_DISC_SCD2):', name.toUpperCase().replace(/\s+/g,'_')); if (!code) return;
        window.api.templates.createJob({ template_name: name, template_code: code })
            .then(r => { loadTemplates(); })
            .catch(err => showError('Fehler: ' + err.message));
    });
}

// ── History Tab ───────────────────────────────────────────────────
let _histLoaded = false;
async function loadHistory() {
    const tbody  = document.getElementById('hist-tbody');
    const status = document.getElementById('hist-status').value;
    const limit  = parseInt(document.getElementById('hist-limit').value) || 50;
    tbody.innerHTML = '<tr><td colspan="7" class="history-empty">⏳ Lade History…</td></tr>';
    try {
        const params = { limit };
        if (status) params.status = status;
        const runs = await window.api.etl.runs.list(params);
        const list = Array.isArray(runs) ? runs : (runs?.items ?? []);
        if (!list.length) {
            tbody.innerHTML = '<tr><td colspan="7" class="history-empty">Keine Ausführungen gefunden.</td></tr>';
            return;
        }
        tbody.innerHTML = list.map(run => {
            const s = (run.status || '').toLowerCase();
            const dc = s === 'running' ? 'running' : (s === 'ok' || s === 'success' || s === 'completed') ? 'ok' : s === 'error' || s === 'failed' ? 'error' : 'never';
            const dur = run.duration_seconds != null ? `${Math.round(run.duration_seconds)}s` : '—';
            const rows = run.rows_processed != null ? run.rows_processed.toLocaleString() : '—';
            return `<tr>
                <td><span class="run-dot ${dc}"></span>${escHtml(run.status || '—')}</td>
                <td>${escHtml(run.job_name || '—')}</td>
                <td>${escHtml(run.source_table_name || '—')} → ${escHtml(run.target_table_name || '—')}</td>
                <td>${formatTs(run.started_at)}</td>
                <td>${dur}</td>
                <td>${rows}</td>
                <td style="font-size:0.78em;color:#aaa">${run.run_id ?? '—'}</td>
            </tr>`;
        }).join('');
        _histLoaded = true;
    } catch (err) {
        tbody.innerHTML = `<tr><td colspan="7" class="history-empty" style="color:#c0392b">Fehler: ${escHtml(err.message)}</td></tr>`;
    }
}

document.getElementById('btn-hist-refresh').addEventListener('click', () => {
    _histLoaded = false;
    loadHistory();
});
document.getElementById('hist-status').addEventListener('change', () => {
    _histLoaded = false;
    loadHistory();
});
document.getElementById('hist-limit').addEventListener('change', () => {
    _histLoaded = false;
    loadHistory();
});

// ── Hilfsfunktionen ───────────────────────────────────────────────
function escHtml(s) {
    return String(s ?? '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
function formatTs(ts) {
    if (!ts) return '—';
    try {
        const d = new Date(ts);
        const p = n => String(n).padStart(2, '0');
        return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
    } catch { return ts; }
}

// ── Init ──────────────────────────────────────────────────────────
initJobsTab();
_initTplResize();
_initTplImport();

})();
</script>
