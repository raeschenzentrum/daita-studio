<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metadata Explorer - metadaita</title>
    <link rel="stylesheet" href="style.css?v=1773835619">
    <style>
        /* Metadata Explorer specific styles */
        .explorer-layout {
            display: grid;
            grid-template-columns: 220px 280px 1fr;
            gap: 20px;
            height: calc(100vh - 140px);
        }
        
        .explorer-panel {
            background: var(--card-bg);
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .panel-header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
        }
        
        .panel-header h2 {
            margin: 0;
            font-size: 1.1em;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .panel-content {
            flex: 1;
            overflow-y: auto;
            padding: 0;
        }
        
        /* Layer/Database List */
        .nav-item {
            padding: 12px 20px;
            cursor: pointer;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s;
        }
        
        .nav-item:hover {
            background: rgba(102, 126, 234, 0.1);
        }
        
        .nav-item.active {
            background: rgba(102, 126, 234, 0.15);
            border-left: 3px solid var(--primary-color);
        }
        
        .nav-item .name {
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .nav-item .count {
            background: var(--bg-color);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 12px;
            color: var(--text-secondary);
        }
        
        .layer-badge {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: 600;
        }
        
        .layer-RAW { background: #e3f2fd; color: #1565c0; }
        .layer-DISC { background: #e8f5e9; color: #2e7d32; }
        .layer-REUS { background: #fff3e0; color: #ef6c00; }
        .layer-CONS { background: #f3e5f5; color: #7b1fa2; }
        
        /* Table List */
        .table-item {
            padding: 10px 15px;
            cursor: pointer;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .table-item:hover {
            background: rgba(102, 126, 234, 0.05);
        }
        
        .table-item.active {
            background: rgba(102, 126, 234, 0.1);
            border-left: 3px solid var(--primary-color);
        }
        
        .table-item .table-name {
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .table-item .col-count {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .table-item-actions {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-delete-table {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 13px;
            padding: 2px 4px;
            border-radius: 3px;
            opacity: 0;
            transition: opacity 0.15s, background 0.15s;
            line-height: 1;
        }

        .table-item:hover .btn-delete-table {
            opacity: 1;
        }

        .btn-delete-table:hover {
            background: rgba(220, 53, 69, 0.15);
        }

        .column-type-plain {
            color: var(--text-secondary);
            font-size: 11px;
        }
        
        /* Column Editor */
        .column-editor-header {
            padding: 15px 20px;
            background: var(--bg-color);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .column-editor-header h3 {
            margin: 0;
            font-size: 14px;
            color: var(--text-primary);
        }
        
        .column-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        
        .column-table th {
            background: var(--bg-color);
            padding: 10px 12px;
            text-align: left;
            font-weight: 600;
            position: sticky;
            top: 0;
            border-bottom: 2px solid var(--border-color);
        }
        
        .column-table td {
            padding: 8px 12px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .column-table tr:hover {
            background: rgba(102, 126, 234, 0.05);
        }
        
        .column-type {
            font-family: monospace;
            font-size: 12px;
            color: var(--text-secondary);
        }
        
        .column-flags {
            display: flex;
            gap: 4px;
        }
        
        .flag-badge {
            font-size: 9px;
            padding: 2px 5px;
            border-radius: 3px;
            font-weight: 600;
        }
        
        .flag-bk { background: #ffecb3; color: #ff8f00; }
        .flag-tk { background: #e1bee7; color: #8e24aa; }
        .flag-scd { background: #b2dfdb; color: #00796b; }
        .flag-audit { background: #cfd8dc; color: #546e7a; }
        
        /* Import Panel */
        .import-panel {
            padding: 15px 20px;
            background: #f8f9fa;
            border-top: 1px solid var(--border-color);
        }
        
        .import-btn {
            width: 100%;
            padding: 10px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .import-btn:hover {
            background: var(--secondary-color);
        }
        
        /* Empty state */
        .empty-state {
            padding: 40px 20px;
            text-align: center;
            color: var(--text-secondary);
        }
        
        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        /* Action buttons */
        .btn-action {
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 4px;
            cursor: pointer;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        
        .btn-sync {
            background: var(--warning-color);
            color: white;
        }
        
        .btn-sync:hover {
            background: #f57c00;
        }
        
        /* Top nav override for explorer */
        .top-nav {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .top-nav .brand {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .top-nav .brand h1 {
            margin: 0;
            font-size: 1.5em;
        }
        
        .top-nav .nav-links {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .nav-links a {
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 6px;
            transition: all 0.2s;
            font-size: 14px;
        }
        
        .nav-links a:hover {
            background: rgba(255,255,255,0.1);
            color: white;
        }
        
        .nav-links a.active {
            background: rgba(255,255,255,0.2);
            color: white;
        }
        
        /* Import Modal */
        .import-modal-content {
            max-height: 60vh;
            overflow-y: auto;
        }
        
        .import-table-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        
        .import-table-item {
            padding: 10px 15px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .import-table-item:hover {
            background: rgba(102, 126, 234, 0.05);
        }
        
        .import-table-item .tbl-name {
            font-weight: 500;
        }
        
        .import-table-item .btn-import-single {
            padding: 4px 10px;
            background: var(--success-color);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .import-table-item .btn-import-single:hover {
            background: #388e3c;
        }
        
        .import-table-item.imported {
            opacity: 0.5;
        }
        
        .import-table-item.imported .btn-import-single {
            display: none;
        }
        
        .badge-imported {
            font-size: 11px;
            color: var(--success-color);
        }
    </style>
</head>
<body>
    <nav class="top-nav">
        <div class="brand">
            <h1>🔍 metadaita</h1>
        </div>
        <div class="nav-links">
            <a href="data-flow.html">🌊 Flow</a>
            <a href="lineage.html">🔗 Lineage</a>
            <a href="etl-dashboard.html">🚀 ETL</a>
            <a href="pipeline.html">🔀 Pipeline</a>
            <a href="source-systems.html">🗄️ Sources</a>
            <a href="metadata-explorer.html" class="active">📊 Metadata</a>
        </div>
    </nav>

    <div class="container">
        <div class="explorer-layout">
            <!-- Layer/Database Panel -->
            <div class="explorer-panel">
                <div class="panel-header">
                    <h2>🗂️ Layers</h2>
                </div>
                <div class="panel-content" id="layerList">
                    <div class="empty-state">
                        <div class="spinner"></div>
                        Lade Layers...
                    </div>
                </div>
            </div>
            
            <!-- Tables Panel -->
            <div class="explorer-panel">
                <div class="panel-header">
                    <h2>📋 Tabellen</h2>
                </div>
                <div class="panel-content" id="tableList">
                    <div class="empty-state">
                        <div class="icon">👈</div>
                        <p>Wähle eine Datenbank</p>
                    </div>
                </div>
                <div class="import-panel" id="importPanel" style="display: none;">
                    <button class="import-btn" onclick="showImportModal()">
                        ➕ Neue Tabelle importieren
                    </button>
                </div>
            </div>
            
            <!-- Column Editor Panel -->
            <div class="explorer-panel">
                <div class="panel-header">
                    <h2>🔧 Spalten-Editor</h2>
                </div>
                <div id="columnEditor">
                    <div class="empty-state">
                        <div class="icon">👈</div>
                        <p>Wähle eine Tabelle</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Import Modal -->
    <div id="importModal" class="modal">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h2 id="importModalTitle">Tabelle importieren</h2>
                <button class="modal-close" onclick="closeImportModal()">&times;</button>
            </div>
            <div class="modal-body import-modal-content" id="importModalBody">
                <div class="empty-state">
                    <div class="spinner"></div>
                    Lade verfügbare Tabellen...
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeImportModal()">Schließen</button>
            </div>
        </div>
    </div>
    
    <!-- Diff Modal (reused from metadata-dashboard) -->
    <div id="diffModal" class="modal">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h2 id="diffModalTitle">Spalten-Vergleich</h2>
                <button class="modal-close" onclick="closeDiffModal()">&times;</button>
            </div>
            <div class="modal-body" id="diffModalBody">
                <div class="empty-state">
                    <div class="spinner"></div>
                    Vergleiche mit Datenbank...
                </div>
            </div>
            <div class="modal-footer" id="diffModalFooter">
                <button class="btn btn-secondary" onclick="closeDiffModal()">Schließen</button>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="metadata-explorer.js?v=1773835619"></script>
</body>
</html>
