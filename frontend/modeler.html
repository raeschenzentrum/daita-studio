<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>daita-studio – Modeler</title>
    <link rel="stylesheet" href="vendor/jointjs.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="config.js"></script>
    <script>
        // API-Basis für modeler-canvas.js
        window._MODELER_API = (window.METADAITA_CONFIG?.backend_url || '').replace(/\/$/, '');
    </script>
    <style>
        /* ── Modeler Canvas Theme (light) ─────────────────────────── */
        :root {
            --bg-base:    #f5f7fa;
            --bg-surface: #ffffff;
            --border:     #e0e0e0;
            --text:       #2b2d42;
            --text-muted: #888888;
            --accent:     #667eea;
            --danger:     #e74c3c;
        }
        /* ── Reset & Layout ───────────────────────────────────────── */
        * { box-sizing: border-box; }
        body { margin: 0; overflow: hidden; }
        #app-body {
            display: flex; flex-direction: column;
            height: calc(100vh - 52px);   /* Platz für nav-header */
            overflow: hidden;
        }
        #app-main-row {
            display: flex; flex: 1; min-height: 0; overflow: hidden;
        }

        /* ── Sidebar Links ────────────────────────────────────────── */
        #sidebar-left {
            width: 240px; flex-shrink: 0;
            display: flex; flex-direction: column;
            background: var(--card-bg, #fff);
            border-right: 1px solid var(--border-color, #ddd);
            overflow: hidden;
        }
        #sidebar-tabs {
            display: flex; border-bottom: 1px solid var(--border-color, #ddd);
            flex-shrink: 0;
        }
        .sidebar-tab {
            flex: 1; padding: 8px 4px; font-size: 0.78em;
            background: none; border: none; cursor: pointer;
            color: var(--text-secondary, #666); border-bottom: 2px solid transparent;
        }
        .sidebar-tab.active { color: #667eea; border-bottom-color: #667eea; font-weight: 600; }
        .sidebar-panel { display: none; flex: 1; flex-direction: column; overflow: hidden; }
        .sidebar-panel.active { display: flex; }

        /* ── Tabellen-Liste ───────────────────────────────────────── */
        .panel-search-row { padding: 8px; border-bottom: 1px solid var(--border-color, #eee); }
        .panel-search-row input {
            width: 100%; padding: 5px 8px; font-size: 0.85em;
            border: 1px solid var(--border-color, #ddd); border-radius: 5px;
            background: var(--bg-color, #f5f5f5); color: var(--text-primary, #333);
        }
        #table-list { flex: 1; overflow-y: auto; font-size: 0.83em; }
        /* ── Layer-Filter-Chips ───────────────────────────────────── */
        .layer-chips {
            display: flex; flex-wrap: wrap; gap: 4px;
            padding: 6px 8px; border-bottom: 1px solid var(--border-color, #eee);
            background: var(--bg-color, #f9f9f9);
        }
        .layer-chip {
            padding: 2px 8px; border-radius: 10px; font-size: 0.72em;
            font-weight: 600; cursor: pointer; border: 1px solid #ddd;
            background: #fff; color: #888; transition: all 0.12s;
            white-space: nowrap;
        }
        .layer-chip:hover { border-color: #667eea; color: #667eea; }
        .layer-chip.active { background: #667eea; color: #fff; border-color: #667eea; }
        .table-group-header {
            padding: 5px 10px 3px; font-size: 0.75em; font-weight: 700;
            color: var(--text-secondary, #888); text-transform: uppercase;
            background: var(--bg-color, #f5f5f5); letter-spacing: 0.05em;
            border-bottom: 1px solid var(--border-color, #eee);
        }
        .table-item {
            padding: 5px 14px; cursor: pointer; user-select: none;
            display: flex; align-items: center; gap: 6px;
            border-bottom: 1px solid transparent; transition: background 0.1s;
        }
        .table-item:hover { background: #f4f0ff; }
        .table-item.on-canvas { color: #667eea; font-weight: 600; }
        .table-icon { font-size: 0.85em; opacity: 0.7; }
        .table-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* ── Import-Panel ─────────────────────────────────────────── */
        .panel-section-title {
            padding: 8px 10px 4px; font-size: 0.78em; font-weight: 700;
            color: var(--text-secondary, #888); text-transform: uppercase;
        }
        .panel-row { padding: 4px 10px; display: flex; align-items: center; gap: 6px; font-size: 0.82em; }
        .panel-row label { min-width: 55px; }
        .panel-row select { flex: 1; font-size: 0.85em; padding: 3px 5px;
            border: 1px solid var(--border-color, #ddd); border-radius: 4px;
            background: var(--bg-color, #f5f5f5); }
        #btn-load-candidates { margin: 6px 10px; }
        #import-candidates-list { flex: 1; overflow-y: auto; padding: 0 4px; font-size: 0.8em; }
        #btn-import-selected { margin: 4px 10px; }
        .import-candidate { display: flex; align-items: center; gap: 6px; padding: 3px 6px; cursor: pointer; }
        .import-candidate:hover { background: #f4f0ff; }
        .import-candidate--exists { opacity: 0.5; }
        .import-meta-badge { font-size: 0.75em; color: #27ae60; }
        .import-select-all { padding: 6px 8px; font-size: 0.82em; border-bottom: 1px solid var(--border-color, #eee); }
        .import-section-sep { padding: 4px 8px; font-size: 0.75em; color: #aaa; text-align: center; }

        /* ── Areas-Panel ──────────────────────────────────────────── */
        #areas-list { flex: 1; overflow-y: auto; padding: 6px; }
        .area-item { padding: 5px 8px; font-size: 0.83em; cursor: pointer; border-radius: 4px; }
        .area-item:hover { background: #f4f0ff; }
        #btn-new-area { margin: 6px 10px; }

        /* ── Canvas ───────────────────────────────────────────────── */
        #canvas-wrap {
            flex: 1; display: flex; flex-direction: column;
            position: relative; overflow: hidden; min-width: 0;
            background: #f5f7fa;
            --bg-base: #f5f7fa;
        }
        #canvas-toolbar {
            display: flex; align-items: center; gap: 6px; padding: 6px 10px;
            background: #fff; border-bottom: 1px solid var(--border-color, #ddd);
            flex-shrink: 0; z-index: 2;
        }
        #canvas-toolbar button {
            padding: 4px 10px; border: 1px solid var(--border-color, #ddd);
            border-radius: 5px; background: transparent; color: var(--text-primary, #333);
            cursor: pointer; font-size: 0.82em;
        }
        #canvas-toolbar button:hover { background: var(--bg-color, #f5f5f5); }
        #canvas-toolbar button.active { background: rgba(102,126,234,0.15); border-color: #667eea; color: #667eea; }
        .toolbar-sep { width: 1px; height: 20px; background: var(--border-color, #ddd); margin: 0 2px; }
        #erd-canvas { flex: 1; display: block; }
        #canvas-hint {
            position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.6); color: #aaa; padding: 6px 14px;
            border-radius: 20px; font-size: 0.8em; pointer-events: none;
            transition: opacity 0.3s;
        }
        #canvas-hint.hidden { opacity: 0; }
        #erd-node-toolbar {
            position: fixed; z-index: 100;
            display: none; gap: 2px;
            background: #fff; border: 1px solid var(--border-color, #ddd);
            border-radius: 6px; padding: 3px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.12);
        }
        .ent-btn {
            padding: 4px 8px; border: 1px solid transparent;
            border-radius: 4px; background: transparent; color: var(--text-primary, #333);
            cursor: pointer; font-size: 0.8em;
        }
        .ent-btn.active, .ent-btn:hover { background: rgba(102,126,234,0.15); border-color: #667eea; color: #667eea; }

        /* ── Sidebar Rechts (Properties) ──────────────────────────── */
        #sidebar-right {
            width: 320px; flex-shrink: 0;
            display: flex; flex-direction: column;
            background: var(--card-bg, #fff);
            border-left: 1px solid var(--border-color, #ddd);
            overflow: hidden;
        }

        /* ── Vertikale Resize-Handles ─────────────────────────────── */
        .v-resizer {
            width: 4px; flex-shrink: 0; cursor: col-resize;
            background: var(--border-color, #ddd);
            transition: background 0.15s;
            z-index: 10;
        }
        .v-resizer:hover, .v-resizer.dragging { background: linear-gradient(180deg, #667eea, #764ba2); }
        #properties-header {
            padding: 10px 14px; font-weight: 700; font-size: 0.87em;
            background: linear-gradient(135deg, #667eea22, #764ba222);
            border-bottom: 1px solid #e8e4fb; flex-shrink: 0;
            color: #764ba2;
        }
        #properties-content { flex: 1; overflow-y: auto; }
        .placeholder-text {
            padding: 20px; text-align: center;
            color: var(--text-secondary, #888); font-size: 0.85em;
        }

        /* ── Diagram-Toolbar (Header-Zeile) ───────────────────────── */
        #diagram-toolbar {
            display: flex; align-items: center; gap: 8px; padding: 6px 12px;
            background: var(--card-bg, #fff); border-bottom: 1px solid var(--border-color, #ddd);
            flex-shrink: 0; font-size: 0.83em;
        }
        #diagram-name {
            padding: 4px 8px; border: 1px solid var(--border-color, #ddd);
            border-radius: 5px; background: var(--bg-color, #f5f5f5);
            color: var(--text-primary, #333); font-size: 0.9em; width: 180px;
        }
        #diagram-toolbar button {
            padding: 4px 10px; border: 1px solid var(--border-color, #ddd);
            border-radius: 5px; background: transparent; cursor: pointer; font-size: 0.85em;
        }
        #btn-save-diagram { border-color: #667eea; color: #667eea; }
        #btn-save-diagram:hover { background: #667eea; color: #fff; }
        #btn-load-diagram:hover, #btn-export-svg:hover { background: var(--bg-color, #f5f5f5); }

        /* ── Modals ───────────────────────────────────────────────── */
        .modal-overlay {
            position: fixed; inset: 0; z-index: 1000;
            background: rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center;
        }
        .modal-box {
            background: var(--card-bg, #fff); border-radius: 10px;
            padding: 20px; min-width: 340px; max-width: 90vw;
            box-shadow: 0 8px 40px rgba(0,0,0,0.2);
        }
        .modal-title { font-weight: 700; font-size: 1em; margin-bottom: 14px; }
        .modal-field { margin-bottom: 10px; }
        .modal-field label { display: block; font-size: 0.83em; color: #666; margin-bottom: 3px; }
        .modal-field input, .modal-field select {
            width: 100%; padding: 6px 10px; border: 1px solid var(--border-color, #ddd);
            border-radius: 5px; font-size: 0.9em; background: var(--bg-color, #f5f5f5);
        }
        .modal-field-hint { font-size: 0.8em; color: #888; margin-left: 4px; }
        .modal-buttons { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; }
        .modal-file-list { max-height: 200px; overflow-y: auto; margin-bottom: 10px; }
        .modal-file-item {
            display: flex; align-items: center; gap: 8px; padding: 7px 10px;
            cursor: pointer; border-radius: 5px; font-size: 0.88em;
        }
        .modal-file-item:hover { background: #f4f0ff; }
        .modal-file-item.selected { background: #ede9fb; color: #764ba2; }
        .modal-file-empty { padding: 12px; text-align: center; color: #aaa; font-size: 0.85em; }
        .modal-input-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .modal-input-row label { min-width: 50px; font-size: 0.83em; }
        .modal-input-row input {
            flex: 1; padding: 5px 8px; border: 1px solid var(--border-color, #ddd);
            border-radius: 4px; font-size: 0.9em; background: var(--bg-color, #f5f5f5);
        }

        /* ── Kontextmenü ──────────────────────────────────────────── */
        .ctx-menu {
            position: fixed; z-index: 500; background: var(--card-bg, #fff);
            border: 1px solid var(--border-color, #ddd); border-radius: 6px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15); min-width: 180px; overflow: hidden;
        }
        .ctx-item { padding: 8px 14px; cursor: pointer; font-size: 0.85em; }
        .ctx-item:hover { background: #f4f0ff; }
        .ctx-sep { height: 1px; background: var(--border-color, #eee); margin: 2px 0; }

        /* ── Buttons (shared) ─────────────────────────────────────── */
        .btn-primary {
            padding: 6px 14px; background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 0.85em;
        }
        .btn-primary:hover { opacity: 0.9; }
        .btn-primary:disabled { opacity: 0.5; }
        .btn-secondary {
            padding: 6px 14px; border: 1px solid var(--border-color, #ddd);
            background: transparent; border-radius: 6px; cursor: pointer; font-size: 0.85em;
        }
        .btn-secondary:hover { background: var(--bg-color, #f5f5f5); }

        /* ── Layer-Leiste (Flow-Stil) ──────────────────────── */
        #mdl-layerbar {
            display: flex; gap: 8px; align-items: stretch; flex-shrink: 0;
            padding: 10px 14px; background: #f7f8fc;
            border-bottom: 1px solid var(--border-color, #e5e5e5);
            overflow-x: auto;
        }
        #mdl-layerbar:empty { display: none; }
        .mdl-lnode {
            background: #fff; border: 2px solid transparent; border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08); padding: 8px 16px;
            min-width: 110px; cursor: pointer; text-align: center;
            transition: border-color .15s, box-shadow .15s; flex-shrink: 0;
        }
        .mdl-lnode:hover { box-shadow: 0 4px 14px rgba(102,126,234,0.22); }
        .mdl-lnode.active { border-color: #667eea; box-shadow: 0 4px 14px rgba(102,126,234,0.3); }
        .mdl-lnode-icon  { font-size: 1.5em; line-height: 1; }
        .mdl-lnode-code  { font-weight: 800; font-size: 0.85em; color: #333; margin-top: 2px; }
        .mdl-lnode.active .mdl-lnode-code { color: #667eea; }
        .mdl-lnode-count { font-size: 0.7em; color: #999; margin-top: 1px; }
        .mdl-auto-chk {
            display: inline-flex; align-items: center; gap: 5px;
            font-size: 0.82em; color: #555; cursor: pointer;
            margin-left: auto; white-space: nowrap;
        }
    </style>
</head>
<body>

<!-- Navigation -->
<studio-nav active="modeler"></studio-nav>

<div id="app-body">

<!-- Diagram-Toolbar -->
<div id="diagram-toolbar">
    <input type="text" id="diagram-name" placeholder="Diagramm-Name…" autocomplete="off" spellcheck="false">
    <button id="btn-save-diagram" title="Ctrl+S">💾 Speichern</button>
    <button id="btn-load-diagram">📂 Laden</button>
    <button id="btn-export-svg">⬇ SVG</button>
    <label class="mdl-auto-chk" title="Beim Klick auf einen Layer direkt das gespeicherte Layer-Diagramm laden">
        <input type="checkbox" id="chk-auto-diagram" checked> Diagramm direkt öffnen
    </label>
</div>

<div id="app-main-row">

  <!-- Linke Sidebar: Tabellen + Import + Areas -->
  <aside id="sidebar-left">
    <div id="sidebar-tabs">
      <button class="sidebar-tab active" data-panel="panel-tables">📋 Tabellen</button>
      <button class="sidebar-tab"        data-panel="panel-import">⬆ Import</button>
      <button class="sidebar-tab"        data-panel="panel-areas">🗂 Areas</button>
    </div>

    <div id="panel-tables" class="sidebar-panel active">
      <div class="panel-search-row">
        <input type="text" id="table-search" placeholder="Tabelle suchen…" autocomplete="off">
      </div>
      <div class="layer-chips" id="layer-chips"></div>
      <div id="table-list"><div class="placeholder-text">Lade Tabellen…</div></div>
    </div>

    <div id="panel-import" class="sidebar-panel">
      <div class="panel-section-title">Aus Teradata importieren</div>
      <div class="panel-row">
        <label>Datenbank:</label>
        <select id="import-db-select"><option value="">– wählen –</option></select>
      </div>
      <button id="btn-load-candidates" class="btn-primary">Kandidaten laden</button>
      <div id="import-candidates-list"></div>
      <button id="btn-import-selected" class="btn-primary" style="display:none">Auswahl importieren</button>
    </div>

    <div id="panel-areas" class="sidebar-panel">
      <div class="panel-section-title">Subject Areas</div>
      <div id="areas-list"></div>
      <button id="btn-new-area" class="btn-secondary">+ Neue Area</button>
    </div>
  </aside>

  <div class="v-resizer" id="resizer-left"></div>

  <!-- ERD Canvas -->
  <main id="canvas-wrap">
    <!-- Layer-Leiste (Flow-Stil): Layer wählen → Datenmodell des Layers -->
    <div id="mdl-layerbar"></div>
    <div id="canvas-toolbar">
      <button id="btn-zoom-in"  title="+">＋</button>
      <button id="btn-zoom-out" title="-">－</button>
      <button id="btn-zoom-fit" title="Alles einpassen">⊞</button>
      <span class="toolbar-sep"></span>
      <button id="btn-fk-mode" title="FK-Beziehung zeichnen">🔗 FK</button>
      <span class="toolbar-sep"></span>
      <button id="btn-delete-sel" title="Auswahl entfernen [Del]">🗑</button>
    </div>
    <div id="erd-canvas"></div>
    <div id="erd-node-toolbar">
      <button data-view="columns" class="ent-btn active" title="Spalten">≡</button>
      <button data-view="keys"    class="ent-btn"        title="Keys">🔑</button>
      <button data-view="info"    class="ent-btn"        title="Info">ℹ</button>
    </div>
    <div id="canvas-hint">Tabelle aus der Sidebar auf den Canvas ziehen oder doppelklicken</div>
  </main>

  <div class="v-resizer" id="resizer-right"></div>

  <!-- Rechtes Properties-Panel -->
  <aside id="sidebar-right">
    <div id="properties-header">Eigenschaften</div>
    <div id="properties-content">
      <div class="placeholder-text">Kein Objekt ausgewählt</div>
    </div>
  </aside>

</div><!-- /#app-main-row -->

<!-- Bottom Panel: DBC vs META Spaltenvergleich -->
<div id="bottom-panel"></div>

</div><!-- /#app-body -->

<!-- FK-Modal -->
<div id="fk-modal" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <div class="modal-title" id="fk-modal-title">🔗 FK-Beziehung</div>
    <div class="modal-field">
      <label>Name:</label>
      <input type="text" id="fk-modal-name" placeholder="FK-Name (auto)" autocomplete="off" spellcheck="false">
    </div>
    <div class="modal-field">
      <label>FK-Spalte <span class="modal-field-hint" id="fk-modal-child-hint">(Child)</span>:</label>
      <select id="fk-modal-child-col"></select>
    </div>
    <div class="modal-field">
      <label>PK-Spalte <span class="modal-field-hint" id="fk-modal-parent-hint">(Parent)</span>:</label>
      <select id="fk-modal-parent-col"></select>
    </div>
    <div class="modal-buttons">
      <button id="fk-modal-cancel" class="btn-secondary">Abbrechen</button>
      <button id="fk-modal-ok"     class="btn-primary">OK</button>
    </div>

</div>

<!-- Diagramm-Picker -->
<div id="diagram-modal" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <div class="modal-title" id="diagram-modal-title">Diagramm</div>
    <div id="diagram-file-list" class="modal-file-list"></div>
    <div class="modal-input-row">
      <label>Name:</label>
      <input type="text" id="diagram-modal-name" placeholder="Diagramm-Name…" autocomplete="off" spellcheck="false">
    </div>
    <div class="modal-buttons">
      <button id="diagram-modal-cancel" class="btn-secondary">Abbrechen</button>
      <button id="diagram-modal-ok"     class="btn-primary">OK</button>
    </div>
  </div>
</div>

<!-- Kontextmenü -->
<div id="ctx-menu" class="ctx-menu" style="display:none">
  <div id="ctx-add-canvas" class="ctx-item">▤ Zum Diagramm hinzufügen</div>
  <div class="ctx-sep"></div>
  <div id="ctx-show-props" class="ctx-item">ℹ Eigenschaften anzeigen</div>
</div>

<script src="components/api.js"></script>
<script src="components/nav-header.js"></script>
<script src="components/table-editor.js"></script>
<script src="vendor/jquery.min.js"></script>
<script src="vendor/lodash.min.js"></script>
<script src="vendor/backbone.min.js"></script>
<script src="vendor/jointjs.min.js"></script>
<script src="vendor/modeler-canvas.js"></script>
    <script src="components/table-bottom-panel.js"></script>
<script>
(function () {
'use strict';

// ── API Base ──────────────────────────────────────────────────────────
const API = (window.METADAITA_CONFIG?.backend_url || '').replace(/\/$/, '');

// ── State ─────────────────────────────────────────────────────────────
let _allTables = [];
let _allFKs    = [];
let _tableEditor = null;  // TableEditor-Instanz
let _activeLayerId = null;  // null = Alle Layer

// ── Sidebar Tab-Switching ─────────────────────────────────────────────
function initSidebarTabs() {
  const tabs   = document.querySelectorAll('.sidebar-tab');
  const panels = document.querySelectorAll('.sidebar-panel');
  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      tabs.forEach(t => t.classList.remove('active'));
      panels.forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      const target = document.getElementById(tab.dataset.panel);
      if (target) target.classList.add('active');
    });
  });
}

// ── Tabellenliste ─────────────────────────────────────────────────────
async function loadTableList() {
  const container = document.getElementById('table-list');
  container.innerHTML = '<div class="placeholder-text">Lade…</div>';
  try {
    const tables = await window.api.modeler.tables.list();
    _allTables = Array.isArray(tables) ? tables : [];
    if (!_allTables.length) {
      container.innerHTML = '<div class="placeholder-text">Keine Tabellen gefunden</div>';
      return;
    }
    renderLayerChips();
    renderLayerBar();
    renderTableList(filteredTables());
    // FKs vorladen
    window.api.modeler.fk.list().then(data => {
      if (Array.isArray(data) && !data[0]?.error) {
        _allFKs = data;
      }
    }).catch(() => {});
  } catch (err) {
    container.innerHTML = `<div class="placeholder-text" style="color:#e74c3c">Fehler: ${escHtml(err.message)}</div>`;
  }
}

function filteredTables() {
  const q = (document.getElementById('table-search')?.value ?? '').trim().toUpperCase();
  return _allTables.filter(t => {
    if (_activeLayerId !== null && t.layer_id !== _activeLayerId) return false;
    if (q && !t.table_name?.toUpperCase().includes(q) && !t.table_desc?.toUpperCase().includes(q)) return false;
    return true;
  });
}

const LAYER_NAMES = { '-1':'SRC', 0:'–', 1:'RAW', 2:'DISC', 3:'REUS', 4:'CONS', 20:'META' };

function renderLayerChips() {
  const el = document.getElementById('layer-chips');
  if (!el) return;
  // Einzigartige Layer-IDs aus den Tabellen
  const ids = [...new Set(_allTables.map(t => t.layer_id))].sort((a,b) => a-b);
  el.innerHTML = '';
  // "Alle" Chip
  const allChip = document.createElement('span');
  allChip.className = 'layer-chip' + (_activeLayerId === null ? ' active' : '');
  allChip.textContent = 'Alle';
  allChip.addEventListener('click', () => { _activeLayerId = null; updateChips(); renderTableList(filteredTables()); });
  el.appendChild(allChip);
  // Pro Layer ein Chip
  ids.forEach(lid => {
    const label = LAYER_NAMES[lid] ?? `L${lid}`;
    const count = _allTables.filter(t => t.layer_id === lid).length;
    const chip = document.createElement('span');
    chip.className = 'layer-chip' + (_activeLayerId === lid ? ' active' : '');
    chip.textContent = `${label} (${count})`;
    chip.dataset.layerId = lid;
    chip.addEventListener('click', () => { _activeLayerId = lid; updateChips(); renderTableList(filteredTables()); });
    el.appendChild(chip);
  });
}

function updateChips() {
  document.querySelectorAll('.layer-chip').forEach(c => {
    const lid = c.dataset.layerId !== undefined ? Number(c.dataset.layerId) : null;
    c.classList.toggle('active', lid === _activeLayerId);
  });
  updateLayerBar();
}

// ── Layer-Leiste (Flow-Stil) + Layer-Diagramm ─────────────────────
const MDL_LAYER_ICONS = { SRC:'🗄️', RAW:'📦', DISC:'🔍', REUS:'♻️', CONS:'📊', META:'🏷️' };

function renderLayerBar() {
  const el = document.getElementById('mdl-layerbar');
  if (!el) return;
  const ids = [...new Set(_allTables.map(t => t.layer_id))].sort((a, b) => a - b);
  el.innerHTML = '';
  ids.forEach(lid => {
    const code = LAYER_NAMES[lid] ?? `L${lid}`;
    const count = _allTables.filter(t => t.layer_id === lid).length;
    const node = document.createElement('div');
    node.className = 'mdl-lnode' + (_activeLayerId === lid ? ' active' : '');
    node.dataset.layerId = lid;
    node.innerHTML =
      `<div class="mdl-lnode-icon">${MDL_LAYER_ICONS[code] || '📁'}</div>` +
      `<div class="mdl-lnode-code">${escHtml(code)}</div>` +
      `<div class="mdl-lnode-count">${count} Objekte</div>`;
    node.addEventListener('click', () => {
      _activeLayerId = lid;
      updateChips();
      renderTableList(filteredTables());
      if (document.getElementById('chk-auto-diagram')?.checked) openLayerDiagram(code);
    });
    el.appendChild(node);
  });
}

function updateLayerBar() {
  document.querySelectorAll('.mdl-lnode').forEach(n => {
    n.classList.toggle('active', Number(n.dataset.layerId) === _activeLayerId);
  });
}

async function openLayerDiagram(layerCode) {
  if (!layerCode) return;
  const name = `${layerCode}_LAYER`;
  const data = await window.api.diagrams.load(name).catch(() => null);
  if (!data) {
    alert(`Kein gespeichertes Diagramm "${name}" gefunden.`);
    return;
  }
  const tableMap = {};
  _allTables.forEach(t => { tableMap[t.table_id] = t; });
  document.getElementById('diagram-name').value = data.name || name;

function renderTableList(tables) {
  const container = document.getElementById('table-list');
  if (!tables.length) { container.innerHTML = '<div class="placeholder-text">Keine Treffer</div>'; return; }
  let lastDb = null;
  const frag = document.createDocumentFragment();
  tables.forEach(t => {
    if (t.db_name !== lastDb) {
      const grp = document.createElement('div');
      grp.className = 'table-group-header';
      grp.textContent = t.db_name || '–';
      frag.appendChild(grp);
      lastDb = t.db_name;
    }
    const item = document.createElement('div');
    item.className = 'table-item';
    item.dataset.tableId   = t.table_id;
    item.dataset.tableName = t.table_name;
    item.draggable = true;
    item.title = t.table_desc || t.table_name;
    item.innerHTML = `<span class="table-icon">▤</span><span class="table-name">${escHtml(t.table_name)}</span>`;
    item.addEventListener('click', () => showTableProperties(t));
    item.addEventListener('contextmenu', e => showContextMenu(e, t));
    item.addEventListener('dragstart', e => {
      e.dataTransfer.effectAllowed = 'copy';
      e.dataTransfer.setData('table_data', JSON.stringify(t));
    });
    frag.appendChild(item);
  });
  container.innerHTML = '';
  container.appendChild(frag);
}

// ── Diagramm Save/Load ────────────────────────────────────────────────
function openDiagramPicker(mode, existing) {
  return new Promise(resolve => {
    const overlay  = document.getElementById('diagram-modal');
    const title    = document.getElementById('diagram-modal-title');
    const fileList = document.getElementById('diagram-file-list');
    const input    = document.getElementById('diagram-modal-name');
    const btnOk    = document.getElementById('diagram-modal-ok');
    const btnCancel= document.getElementById('diagram-modal-cancel');
    title.textContent = mode === 'save' ? '💾 Diagramm speichern' : '📂 Diagramm laden';
    fileList.innerHTML = '';
    if (!existing.length) {
      fileList.innerHTML = `<div class="modal-file-empty">${mode === 'load' ? 'Keine gespeicherten Diagramme' : 'Noch keine – neuen Namen eingeben'}</div>`;
    } else {
      existing.forEach(entry => {
        const name = typeof entry === 'string' ? entry : entry.name;
        const item = document.createElement('div');
        item.className = 'modal-file-item'; item.dataset.name = name;
        item.innerHTML = `<span>📄</span><span>${escHtml(name)}</span>`;
        item.addEventListener('click', () => {
          fileList.querySelectorAll('.modal-file-item').forEach(i => i.classList.remove('selected'));
          item.classList.add('selected'); input.value = name;
        });
        item.addEventListener('dblclick', () => close(name));
        fileList.appendChild(item);
      });
    }
    const cur = document.getElementById('diagram-name').value.trim();
    input.value = mode === 'save' ? cur : ''; overlay.style.display = 'flex'; input.focus(); input.select();
    function close(result) {
      overlay.style.display = 'none';
      btnOk.removeEventListener('click', onOk);
      btnCancel.removeEventListener('click', onCancel);
      document.removeEventListener('keydown', onKey);
      resolve(result || null);
    }
    function onOk()    { close(input.value.trim() || null); }
    function onCancel(){ close(null); }
    function onKey(e)  { if (e.key === 'Enter') { e.preventDefault(); onOk(); } if (e.key === 'Escape') { e.preventDefault(); onCancel(); } }
    btnOk.addEventListener('click', onOk);
    btnCancel.addEventListener('click', onCancel);
    document.addEventListener('keydown', onKey);
    overlay.addEventListener('click', e => { if (e.target === overlay) onCancel(); }, { once: true });
  });
}

function initDiagramButtons() {
  document.getElementById('btn-save-diagram').addEventListener('click', async () => {
    const layout = ERD.getLayout();
    if (!layout.length) { alert('Canvas ist leer'); return; }
    const existing = await window.api.diagrams.list().catch(() => []);
    const name = await openDiagramPicker('save', existing);
    if (!name) return;
    const ok = await window.api.diagrams.save(name, { name, cells: layout, saved_at: new Date().toISOString() }).catch(() => false);
    const btn = document.getElementById('btn-save-diagram');
    if (ok !== false) { document.getElementById('diagram-name').value = name; btn.textContent = '✅ Gespeichert'; }
    else btn.textContent = '❌ Fehler';
    setTimeout(() => { btn.textContent = '💾 Speichern'; }, 2000);
  });

  document.getElementById('btn-load-diagram').addEventListener('click', async () => {
    const existing = await window.api.diagrams.list().catch(() => []);
    const name = await openDiagramPicker('load', existing);
    if (!name) return;
    const data = await window.api.diagrams.load(name).catch(() => null);
    if (!data) { alert(`Diagramm "${name}" nicht gefunden`); return; }
    const tableMap = {};
    _allTables.forEach(t => { tableMap[t.table_id] = t; });
    document.getElementById('diagram-name').value = data.name || name;
    await ERD.loadLayout(data.cells || [], tableMap);
    ERD.refreshLinks(_allFKs);
  });

  document.getElementById('btn-export-svg').addEventListener('click', () => {
    const canvas = document.getElementById('erd-canvas');
    const svg = canvas.querySelector('svg');
    if (!svg) { alert('Canvas ist leer'); return; }
    const blob = new Blob([svg.outerHTML], { type: 'image/svg+xml' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = (document.getElementById('diagram-name').value || 'diagram') + '.svg';
    a.click(); URL.revokeObjectURL(a.href);
  });

  // Ctrl+S
  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 's') {
      e.preventDefault();
      document.getElementById('btn-save-diagram').click();
    }
  });
}

const _colCache = {};
async function _fetchColumns(tableId) {
  if (!_colCache[tableId]) {
    _colCache[tableId] = await window.api.modeler.tables.columns(tableId).catch(() => []);
  }
  return _colCache[tableId];
}
function _fillColSelect(sel, cols, selectedId) {
  sel.innerHTML = `<option value="0">— keine —</option>`;
  cols.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.column_id;
    opt.textContent = c.column_name + (c.pk_flag === 'Y' ? ' 🔑' : '');
    if (selectedId && String(c.column_id) === String(selectedId)) opt.selected = true;
    sel.appendChild(opt);
  });
}
async function openFKDialog(mode, childId, childName, parentId, parentName, existing = {}) {
  const overlay   = document.getElementById('fk-modal');
  const titleEl   = document.getElementById('fk-modal-title');
  const nameInp   = document.getElementById('fk-modal-name');
  const childSel  = document.getElementById('fk-modal-child-col');
  const parentSel = document.getElementById('fk-modal-parent-col');
  document.getElementById('fk-modal-child-hint').textContent  = childName  ? `(${childName})`  : '(Child)';
  document.getElementById('fk-modal-parent-hint').textContent = parentName ? `(${parentName})` : '(Parent)';
  titleEl.textContent = mode === 'edit' ? '🔗 FK bearbeiten' : '🔗 FK-Beziehung anlegen';
  nameInp.value = '⏳ Spalten laden…'; nameInp.disabled = true;
  childSel.innerHTML = parentSel.innerHTML = '<option>Laden…</option>';
  overlay.style.display = 'flex';
  const [childCols, parentCols] = await Promise.all([_fetchColumns(childId), _fetchColumns(parentId)]);
  _fillColSelect(childSel, childCols, existing.from_column_id);
  _fillColSelect(parentSel, parentCols, existing.to_column_id);
  nameInp.value = existing.fk_name || `FK_${childName||childId}_${parentName||parentId}`.substring(0, 60);
  nameInp.disabled = false; nameInp.focus(); nameInp.select();
  return new Promise(resolve => {
    function cleanup() {
      overlay.style.display = 'none';
      btnOk.removeEventListener('click', onOk);
      btnCancel.removeEventListener('click', onCancel);
      document.removeEventListener('keydown', onKey);
    }
    const btnOk    = document.getElementById('fk-modal-ok');
    const btnCancel= document.getElementById('fk-modal-cancel');
    function onOk() {
      cleanup();
      resolve({ fk_name: nameInp.value.trim() || null, child_column_id: parseInt(childSel.value)||null, parent_column_id: parseInt(parentSel.value)||null });
    }
    function onCancel() { cleanup(); resolve(null); }
    function onKey(e) { if (e.key==='Escape') { e.preventDefault(); onCancel(); } if (e.key==='Enter') { e.preventDefault(); onOk(); } }
    btnOk.addEventListener('click', onOk);
    btnCancel.addEventListener('click', onCancel);
    document.addEventListener('keydown', onKey);
    overlay.addEventListener('click', e => { if (e.target===overlay) onCancel(); }, { once: true });
  });
}
function initFKMode() {
  document.getElementById('btn-fk-mode')?.addEventListener('click', () => ERD.toggleFKMode());
  window.addEventListener('erd:fkConnect', async e => {
    const { fromId, toId, fromName, toName } = e.detail;
    const result = await openFKDialog('create', fromId, fromName, toId, toName);
    if (!result) return;
    try {
      const saved = await window.api.modeler.fk.create({
        fk_name: result.fk_name, child_table_id: fromId, parent_table_id: toId,
        child_column_id: result.child_column_id, parent_column_id: result.parent_column_id,
      });
      _allFKs.push({ fk_id: saved.fk_id, fk_name: saved.fk_name, from_table_id: String(fromId), to_table_id: String(toId), from_column_id: result.child_column_id, to_column_id: result.parent_column_id });
      ERD.refreshLinks(_allFKs);
    } catch (err) { alert('FK konnte nicht gespeichert werden:\n' + err.message); }
  });
  window.addEventListener('erd:fkEdit', async e => {
    const { fkId, fromId, toId } = e.detail;
    const existing = _allFKs.find(f => String(f.fk_id) === String(fkId));
    if (!existing) return;
    const fromT = _allTables.find(t => String(t.table_id) === String(fromId));
    const toT   = _allTables.find(t => String(t.table_id) === String(toId));
    const result = await openFKDialog('edit', fromId, fromT?.table_name||fromId, toId, toT?.table_name||toId, existing);
    if (!result) return;
    try {
      const updated = await window.api.modeler.fk.update(fkId, { fk_name: result.fk_name||existing.fk_name, child_column_id: result.child_column_id, parent_column_id: result.parent_column_id });
      const idx = _allFKs.findIndex(f => String(f.fk_id) === String(fkId));
      if (idx !== -1) { _allFKs[idx] = { ..._allFKs[idx], fk_name: updated.fk_name, from_column_id: result.child_column_id, to_column_id: result.parent_column_id }; }
      ERD.refreshLinks(_allFKs);
    } catch (err) { alert('FK konnte nicht aktualisiert werden:\n' + err.message); }
  });
}

async function initImportPanel() {
  const dbSel = document.getElementById('import-db-select');
  try {
    const dbs = await window.api.modeler.databases();
    dbs.forEach(db => {
      if (db.error) return;
      const opt = document.createElement('option');
      opt.value = opt.textContent = db.db_name;
      dbSel.appendChild(opt);
    });
  } catch { /* ignore */ }
  // Layer-Dropdown
  const layerSel = document.createElement('select');
  layerSel.id = 'import-layer-select';
  try {
    const layers = await window.api.modeler.layers();
    layers.forEach(l => {
      if (l.error) return;
      const opt = document.createElement('option');
      opt.value = l.layer_id; opt.textContent = `${l.layer_short||l.layer_id} – ${l.layer_id}`;
      layerSel.appendChild(opt);
    });
  } catch { /* ignore */ }
  const btnLoad = document.getElementById('btn-load-candidates');
  const layerRow = document.createElement('div');
  layerRow.className = 'panel-row';
  layerRow.innerHTML = '<label>Layer:</label>';
  layerRow.appendChild(layerSel);
  btnLoad.insertAdjacentElement('beforebegin', layerRow);

  btnLoad.addEventListener('click', async () => {
    const dbName = dbSel.value;
    if (!dbName) { alert('Bitte zuerst eine Datenbank wählen'); return; }
    const list = document.getElementById('import-candidates-list');
    list.innerHTML = "<div class='placeholder-text'>Lade…</div>";
    document.getElementById('btn-import-selected').style.display = 'none';
    try {
      const candidates = await window.api.importTd.candidates(dbName);
      if (!candidates.length || candidates[0]?.error) {
        list.innerHTML = `<div class='placeholder-text'>${candidates[0]?.error||'Keine Tabellen gefunden'}</div>`;
        return;
      }
      const newOnes = candidates.filter(c => !c.in_meta);
      const inMeta  = candidates.filter(c =>  c.in_meta);
      list.innerHTML = '';
      const frag = document.createDocumentFragment();
      const allRow = document.createElement('div');
      allRow.className = 'import-select-all';
      allRow.innerHTML = `<label><input type="checkbox" id="import-check-all"> Alle auswählen (${newOnes.length} neu)</label>`;
      frag.appendChild(allRow);
      const makeRow = c => {
        const row = document.createElement('label');
        const kind = c.table_kind === 'V' ? '👁 ' : '▤ ';
        if (c.in_meta) {
          row.className = 'import-candidate import-candidate--exists';
          row.innerHTML = `<input type="checkbox" class="import-check" disabled><span>${kind}${escHtml(c.table_name)}</span><span class="import-meta-badge">✓ META</span>`;
        } else {
          row.className = 'import-candidate';
          row.innerHTML = `<input type="checkbox" class="import-check" value="${escHtml(c.table_name)}"><span>${kind}${escHtml(c.table_name)}</span>`;
        }
        frag.appendChild(row);
      };
      newOnes.forEach(makeRow);
      if (inMeta.length) {
        const sep = document.createElement('div');
        sep.className = 'import-section-sep'; sep.textContent = `— ${inMeta.length} bereits in META —`;
        frag.appendChild(sep); inMeta.forEach(makeRow);
      }
      list.appendChild(frag);
      document.getElementById('btn-import-selected').style.display = newOnes.length ? '' : 'none';
      document.getElementById('import-check-all').addEventListener('change', e => {
        list.querySelectorAll('.import-check:not([disabled])').forEach(cb => { cb.checked = e.target.checked; });
      });
    } catch (err) { list.innerHTML = `<div class='placeholder-text' style='color:#e74c3c'>Fehler: ${escHtml(err.message)}</div>`; }
  });

  document.getElementById('btn-import-selected').addEventListener('click', async () => {
    const dbName  = dbSel.value;
    const layerId = parseInt(layerSel.value) || 1;
    const checked = [...document.querySelectorAll('.import-check:checked')].map(cb => cb.value);
    if (!checked.length) { alert('Keine Tabellen ausgewählt'); return; }
    const btn = document.getElementById('btn-import-selected');
    btn.disabled = true; btn.textContent = `Importiere 0 / ${checked.length}…`;
    let ok = 0, errors = [];
    for (const tableName of checked) {
      try {
        await window.api.importTd.table({ db_name: dbName, table_name: tableName, layer_id: layerId });
        ok++;
      } catch (e) { errors.push(`${tableName}: ${e.message}`); }
      btn.textContent = `Importiere ${ok} / ${checked.length}…`;
    }
    btn.disabled = false; btn.textContent = 'Auswahl importieren';
    const msg = errors.length
      ? `✅ ${ok} importiert\n❌ ${errors.length} Fehler:\n${errors.join('\n')}`
      : `✅ ${ok} Tabelle(n) erfolgreich importiert`;
    alert(msg);
    if (ok > 0) { await loadTableList(); }
  });
}

function initColumnResize() {
  function makeResizer(handle, getEl, side) {
    let _startX = 0, _startW = 0;
    handle.addEventListener('mousedown', e => {
      _startX = e.clientX;
      _startW = getEl().offsetWidth;
      handle.classList.add('dragging');
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';
      const onMove = ev => {
        const dx = ev.clientX - _startX;
        const newW = side === 'left'
          ? Math.max(160, Math.min(520, _startW + dx))
          : Math.max(200, Math.min(600, _startW - dx));
        getEl().style.width = newW + 'px';
      };
      const onUp = () => {
        handle.classList.remove('dragging');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
      e.preventDefault();
    });
  }
  makeResizer(
    document.getElementById('resizer-left'),
    () => document.getElementById('sidebar-left'),
    'left'
  );
  makeResizer(
    document.getElementById('resizer-right'),
    () => document.getElementById('sidebar-right'),
    'right'
  );
}

function escHtml(s) { return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Init ──────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  initSidebarTabs();
  initTableSearch();
  loadTableList();
  requestAnimationFrame(() => { ERD.init(); ERD.refreshTheme(); });
  initContextMenu();
  initDiagramButtons();
  initFKMode();
  initImportPanel();
  initColumnResize();
  initBottomPanel();

  window.addEventListener('erd:select',     e => { showTableProperties(e.detail); showBottomPanel(e.detail); });
  window.addEventListener('erd:tableAdded', () => ERD.refreshLinks(_allFKs));
  document.getElementById('bottom-panel').addEventListener('tbp:tableDeleted', e => {
    const tid = e.detail.table_id;
    _allTables = _allTables.filter(t => t.table_id !== tid);
    ERD.removeTable(tid);
  });

  // URL-Parameter: ?table_id=X → Tabelle automatisch auf Canvas laden
  const _urlTableId = new URLSearchParams(window.location.search).get('table_id');
  if (_urlTableId) {
    // Warten bis Tabellenliste geladen ist, dann auf Canvas droppen
    const _waitForTable = setInterval(() => {
      const t = _allTables.find(t => String(t.table_id) === String(_urlTableId));
      if (t) {
        clearInterval(_waitForTable);
        ERD.addTable(t);
      }
    }, 100);
    setTimeout(() => clearInterval(_waitForTable), 5000); // Timeout nach 5s
  }

  // TableEditor Events weiterleiten → Canvas-Refresh
  document.addEventListener('studio:table-updated', () => loadTableList());
});

})();
</script>
